<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>D2 Project Management - Premium Official</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <!-- Chart.js para Gráficos Interativos -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root { --gold: #fbbf24; --gold-dark: #b45309; --d2-blue: #0f172a; }
        body { font-family: 'Inter', sans-serif; transition: background-color 0.3s; margin: 0; }

        /* Design Login - Enterprise Portal Pattern */
        .auth-body { background-color: #f1f5f9; color: #0f172a; display: flex; align-items: center; justify-content: center; min-height: 100vh; }
        .auth-card {
            background: white; border-radius: 40px; width: 100%; max-width: 440px;
            padding: 48px; box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.1); text-align: center;
        }
        .logo-box { background: var(--d2-blue); border-radius: 20px; padding: 20px; display: inline-block; margin-bottom: 24px; }
        .label-auth { font-size: 11px; font-weight: 800; color: #64748b; text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 6px; display: block; text-align: left; }
        .auth-input {
            width: 100%; padding: 16px 20px; border-radius: 12px; background: #f8fafc;
            border: 1px solid #e2e8f0; color: #0f172a; outline: none; transition: all 0.2s; font-size: 15px;
        }
        .auth-input:focus { border-color: var(--gold); box-shadow: 0 0 0 4px rgba(251, 191, 36, 0.1); }
        .btn-access {
            width: 100%; background: var(--d2-blue); color: white; padding: 18px;
            border-radius: 14px; font-weight: 800; text-transform: uppercase;
            letter-spacing: 0.1em; transition: all 0.3s; margin-top: 10px; border: none; cursor: pointer;
        }
        .btn-access:hover { transform: translateY(-2px); box-shadow: 0 10px 20px rgba(15, 23, 42, 0.2); }

        /* Interface Interna */
        .app-body-dark { background-color: #030508; color: #f1f5f9; }
        .modern-input {
            width: 100%; padding: 14px 45px 14px 16px; border-radius: 12px;
            border: 1px solid rgba(148, 163, 184, 0.2); background: rgba(0,0,0,0.5);
            color: inherit; outline: none; transition: all 0.2s; font-size: 14px;
        }
        .light .modern-input { background: #fff; border: 1px solid #cbd5e1; color: #000; }

        /* FIX DO OLHO - SVG Puro embutido */
        .password-toggle {
            position: absolute; right: 12px; top: 50%; transform: translateY(-50%);
            z-index: 100; color: var(--gold); cursor: pointer;
            background: rgba(0,0,0,0.2); border-radius: 8px; padding: 6px;
            display: flex; align-items: center; justify-content: center; border: none;
        }
        .password-toggle svg { width: 18px; height: 18px; stroke-width: 2.5; }

        /* Unidades e Filtros Pílula */
        .unit-pill { padding: 8px 20px; border-radius: 20px; font-size: 10px; font-weight: 800; border: 1px solid rgba(255,255,255,0.1); cursor: pointer; transition: 0.2s; color: #64748b; background: transparent; }
        .unit-pill.active { background: var(--gold); color: #000; border-color: var(--gold); }
        .filter-pill { padding: 6px 16px; border-radius: 12px; font-size: 10px; font-weight: 800; border: 1px solid rgba(255,255,255,0.05); cursor: pointer; transition: 0.2s; color: #64748b; background: rgba(255,255,255,0.02); }
        .filter-pill.active { background: rgba(255,255,255,0.1); color: #fff; border-color: rgba(255,255,255,0.2); }

        /* Botão Premium Gold */
        .btn-premium-gold {
            background: linear-gradient(135deg, var(--gold) 0%, var(--gold-dark) 100%);
            color: #000; font-weight: 900; padding: 16px; border-radius: 14px;
            text-transform: uppercase; letter-spacing: 0.1em; border: none;
            width: 100%; cursor: pointer; transition: all 0.3s; text-align: center;
        }
        .btn-premium-gold:hover { transform: translateY(-1px); box-shadow: 0 4px 15px rgba(251, 191, 36, 0.4); }

        /* Calendário Premium - CORREÇÃO DE OVERLAP */
        input[type="date"] { position: relative; } 
        input[type="date"]::-webkit-calendar-picker-indicator {
            background: transparent; bottom: 0; color: transparent; cursor: pointer;
            height: auto; left: 0; position: absolute; right: 0; top: 0; width: auto; z-index: 20;
        }
        .date-container { position: relative; display: flex; align-items: center; width: 100%; }
        .calendar-icon-overlay { position: absolute; right: 14px; pointer-events: none; color: var(--gold); z-index: 10; }

        /* Painel Financeiro e Despesas Expansível */
        .finance-panel { max-height: 0; overflow: hidden; transition: all 0.5s ease; opacity: 0; }
        .finance-panel.open { max-height: 5000px; opacity: 1; margin-top: 1.5rem; border-top: 1px solid rgba(255,255,255,0.1); padding-top: 1.5rem; }

        /* Barra de Progresso */
        .progress-track { height: 16px; border-radius: 8px; background: rgba(255,255,255,0.05); overflow: hidden; border: 1px solid rgba(255,255,255,0.05); }
        .progress-bar-fill { height: 100%; transition: width 1.2s cubic-bezier(0.4, 0, 0.2, 1); border-radius: 8px; }

        .glass { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .scrollbar-hide::-webkit-scrollbar { display: none; }
        
        /* Modais */
        .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.7); backdrop-filter: blur(4px); z-index: 1000; display: none; align-items: center; justify-content: center; }
        .modal-overlay.active { display: flex; }
        .modal-content { background: #1e293b; border-radius: 24px; padding: 32px; max-width: 600px; width: 90%; max-height: 80vh; overflow-y: auto; border: 1px solid rgba(255,255,255,0.1); box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5); }

        /* Animação Profissional de Modo Foco */
        @keyframes fadeIn { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }
        .animate-fade-in { animation: fadeIn 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards; }

        /* Estilos de Impressão de Relatório Limpo */
        @media print { 
            .no-print { display: none !important; } 
            body.app-body-dark { background: #fff !important; color: #000 !important; }
            .glass { background: #fff !important; border: 1px solid #e2e8f0 !important; box-shadow: none !important; filter: none !important; backdrop-filter: none !important; }
            .text-white, .text-slate-200, .text-slate-300, .text-slate-400 { color: #0f172a !important; }
            .bg-black\/20, .bg-slate-900\/80, .bg-gradient-to-br, .bg-white\/5 { background: #f8fafc !important; border-color: #cbd5e1 !important; }
            canvas { max-width: 100% !important; }
            .finance-panel.open { max-height: none !important; overflow: visible !important; }
        }

        /* Pequenos estilos auxiliares */
        .flag-btn { border: 1px solid rgba(15,23,42,0.12); border-radius: 14px; padding: 10px; transition: .2s; background: #fff; }
        .flag-btn.active { border-color: var(--gold); box-shadow: 0 0 0 4px rgba(251,191,36,.12); }
        .tab-btn { color: rgba(148,163,184,0.9); }
        .tab-active { color: var(--gold); border-bottom: 2px solid var(--gold); }
        .status-badge { width: 10px; height: 10px; border-radius: 999px; display: inline-block; }
        .text-gold { color: var(--gold); }
        
        /* Tag dinâmica visual para cargos */
        .role-tag { font-size: 9px; padding: 2px 6px; border-radius: 4px; font-weight: 800; text-transform: uppercase; letter-spacing: 0.1em; }
        .role-admin { background: rgba(251,191,36,0.2); color: var(--gold); }
        .role-editor { background: rgba(56,189,248,0.2); color: #38bdf8; }
        .role-viewer { background: rgba(148,163,184,0.2); color: #94a3b8; }
    </style>
</head>
<body class="auth-body">

<!-- Login Screen -->
<div id="auth-screen" class="fixed inset-0 z-[2000] flex items-center justify-center p-6">
    <div class="auth-card">
        <div class="logo-box">
             <img src="logo-D2-Group-preto.png" alt="D2 Group" class="h-10 brightness-0 invert">
        </div>
        <h2 class="text-[11px] font-black tracking-[0.3em] mb-10 text-slate-400 uppercase">D2 Project Management Portal</h2>

        <form id="login-form" class="space-y-6 text-left mb-6">
            <div id="login-error-msg" class="hidden p-4 bg-red-50 border border-red-100 rounded-xl text-red-600 text-[10px] font-bold text-center uppercase tracking-widest leading-relaxed"></div>
            <div id="login-hint-msg" class="hidden p-4 bg-amber-50 border border-amber-100 rounded-xl text-amber-700 text-[10px] font-bold text-center uppercase tracking-widest leading-relaxed"></div>

            <div>
                <label class="label-auth">E-mail Corporativo</label>
                <input type="email" id="email" required class="auth-input" placeholder="usuario@allcablingtech.com">
            </div>

            <div class="relative">
                <label class="label-auth">Senha de Acesso</label>
                <input type="password" id="password" required class="auth-input" placeholder="••••••••">
                <button type="button" onclick="window.togglePassword('password', 'eye-login-btn')" class="password-toggle !text-slate-400" id="eye-login-btn" style="top: 70%;">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
                </button>
            </div>

            <button type="submit" id="btn-entrar" class="btn-access">
                <span>Acessar Sistema</span>
            </button>
        </form>

        <div class="mt-8 flex justify-center gap-4">
            <button onclick="setLang('pt')" class="flag-btn active" id="l-pt"><img src="https://flagcdn.com/w80/br.png" class="w-6"></button>
            <button onclick="setLang('en')" class="flag-btn" id="l-en"><img src="https://flagcdn.com/w80/us.png" class="w-6"></button>
        </div>
    </div>
</div>

<!-- Modal de Edição de Recebimentos (Cliente -> Empresa) -->
<div id="edit-rec-modal" class="modal-overlay">
    <div class="modal-content animate-fade-in">
        <h3 class="text-2xl font-black text-emerald-400 mb-6">Editar Recebimentos (Cliente)</h3>
        <div id="rec-edit-list" class="space-y-4 mb-6"></div>
        <div class="flex justify-end gap-4">
            <button onclick="closeEditRecModal()" class="px-6 py-3 bg-slate-700 text-white rounded-xl font-bold hover:bg-slate-600 transition-colors">Cancelar</button>
            <button onclick="saveEditedRecs()" class="px-8 py-3 bg-emerald-500 text-emerald-950 font-black rounded-xl hover:bg-emerald-400 transition-colors">Salvar Alterações</button>
        </div>
    </div>
</div>

<!-- Modal de Edição de Pagamentos (Empresa -> Vendedor) -->
<div id="edit-payment-modal" class="modal-overlay">
    <div class="modal-content animate-fade-in">
        <h3 class="text-2xl font-black text-gold mb-6">Editar Pagamentos (Vendedor)</h3>
        <div id="payment-edit-list" class="space-y-4 mb-6"></div>
        <div class="flex justify-end gap-4">
            <button onclick="closeEditPaymentModal()" class="px-6 py-3 bg-slate-700 text-white rounded-xl font-bold hover:bg-slate-600 transition-colors">Cancelar</button>
            <button onclick="saveEditedPayments()" class="btn-premium-gold !w-auto px-8">Salvar Alterações</button>
        </div>
    </div>
</div>

<!-- Interface Interna -->
<div id="main-app" class="hidden min-h-screen flex flex-col app-body-dark text-center">
    <header class="no-print bg-white/5 backdrop-blur-md border-b border-white/5 p-4 sticky top-0 z-40">
        <div class="max-w-7xl mx-auto flex justify-between items-center">
            <div class="flex items-center gap-6">
                <div class="bg-white p-2 rounded-xl shadow-md"><img id="header-logo" src="logo-D2-Group-preto.png" class="h-10"></div>
            </div>

            <div class="flex items-center gap-5">
                <button onclick="toggleTheme()" class="p-3 rounded-2xl bg-white/5 hover:bg-gold/20 transition-all"><i data-lucide="sun" id="theme-icon-light" class="hidden text-gold"></i><i data-lucide="moon" id="theme-icon-dark" class="text-slate-400"></i></button>
                <div class="text-right hidden sm:block">
                    <p id="user-display" class="text-xs font-black uppercase text-gold tracking-tight"></p>
                    <p id="user-role-display" class="text-[9px] text-slate-500 font-bold uppercase tracking-widest" data-i18n="admin_panel">Gestão Corporativa</p>
                </div>
                <button onclick="handleLogout()" class="p-3 rounded-2xl text-red-500 hover:bg-red-500/10 transition-all border border-red-500/20 shadow-sm"><i data-lucide="log-out" class="w-5 h-5"></i></button>
            </div>
        </div>
    </header>

    <main class="max-w-7xl mx-auto w-full p-6 flex-1">
        <nav class="no-print flex gap-10 mb-6 border-b border-white/5 overflow-x-auto justify-center sm:justify-start scrollbar-hide">
            <button onclick="showView('projects')" class="tab-btn pb-4 font-black text-[11px] uppercase tracking-[0.2em] tab-active" id="tab-projects" data-i18n="nav_proj">Projetos</button>
            <button onclick="window.cancelEdit(); showView('new')" class="tab-btn pb-4 font-black text-[11px] uppercase tracking-[0.2em] editor-only hidden" id="tab-new" data-i18n="nav_new">Nova Obra</button>
            <button onclick="showView('reports')" class="tab-btn pb-4 font-black text-[11px] uppercase tracking-[0.2em]" id="tab-reports" data-i18n="nav_rep">Relatórios</button>
            <button onclick="showView('users')" class="tab-btn pb-4 font-black text-[11px] uppercase tracking-[0.2em] admin-only hidden" id="tab-users" data-i18n="nav_users">Equipe</button>
            <button onclick="showView('logs')" class="tab-btn pb-4 font-black text-[11px] uppercase tracking-[0.2em] admin-only hidden" id="tab-logs">📋 Logs</button>
        </nav>

        <div id="view-projects" class="w-full">
            <!-- Filtros Superiores (Oculto no Modo Foco) -->
            <div id="projects-filters" class="flex flex-col sm:flex-row justify-between items-center mb-8 gap-4 no-print">
                <div class="flex gap-3">
                    <button onclick="selectUnit('Smart Home')" id="unit-smart" class="unit-pill">SMART HOME</button>
                    <button onclick="selectUnit('HVAC')" id="unit-hvac" class="unit-pill">HVAC</button>
                    <button onclick="selectUnit('Ambas')" id="unit-all" class="unit-pill active">AMBAS</button>
                </div>
                <div class="flex gap-2">
                    <button onclick="setArchiveFilter(false)" id="filter-active" class="filter-pill active">ATIVAS</button>
                    <button onclick="setArchiveFilter(true)" id="filter-archived" class="filter-pill">ARQUIVADAS <i data-lucide="archive" class="inline w-3 h-3 ml-1 mb-0.5"></i></button>
                </div>
            </div>
            
            <div id="projects-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-10 text-left"></div>
        </div>

        <div id="view-new" class="hidden max-w-3xl mx-auto glass p-10 rounded-[40px] text-left shadow-2xl border border-white/5 animate-fade-in">
            <h3 class="text-2xl font-black mb-10 flex items-center gap-4 uppercase tracking-tighter text-white">
                <span class="w-2 h-10 bg-gold rounded-full"></span>
                <span id="form-title" data-i18n="form_new_title">Registrar Obra</span>
            </h3>
            <form id="project-form" class="grid grid-cols-1 md:grid-cols-2 gap-8 text-left">
                <input type="hidden" id="edit-id">

                <div class="col-span-2 md:col-span-1 space-y-2">
                    <label class="text-[10px] font-black uppercase text-slate-500 ml-1 tracking-widest">Nº Proposta</label>
                    <input type="text" id="f-proposta" class="modern-input" placeholder="Ex: PROP-2026-001">
                </div>
                <div class="col-span-2 md:col-span-1 space-y-2">
                    <label class="text-[10px] font-black uppercase text-slate-500 ml-1 tracking-widest">Nº Invoice</label>
                    <input type="text" id="f-invoice" class="modern-input" placeholder="Ex: INV-2026-001">
                </div>

                <div class="col-span-2 space-y-2">
                    <label class="text-[10px] font-black uppercase text-slate-500 ml-1 tracking-widest">Unidade Responsável</label>
                    <select id="f-empresa" class="modern-input"><option value="Smart Home">D2 Smart Home</option><option value="HVAC">D2 HVAC Solutions</option></select>
                </div>
                <div class="col-span-2 md:col-span-1 space-y-2"><label class="text-[10px] font-black uppercase text-slate-500 ml-1 tracking-widest">Cliente</label><input type="text" id="f-cliente" required class="modern-input"></div>
                <div class="col-span-2 md:col-span-1 space-y-2"><label class="text-[10px] font-black uppercase text-slate-500 ml-1 tracking-widest">Vendedor</label><select id="f-vendedor" required class="modern-input"></select></div>
                
                <!-- BLoco de Valores e Custos -->
                <div class="space-y-2">
                    <label class="text-[10px] font-black uppercase text-slate-500 ml-1 tracking-widest">Valor Contrato Bruto</label>
                    <div class="relative"><span class="absolute left-4 top-1/2 -translate-y-1/2 font-bold text-gold">$</span><input type="number" id="f-valor" step="0.01" required class="modern-input !pl-8"></div>
                </div>
                <div class="space-y-2">
                    <label class="text-[10px] font-black uppercase text-indigo-400 ml-1 tracking-widest">Orçamento Custo (Budget)</label>
                    <div class="relative"><span class="absolute left-4 top-1/2 -translate-y-1/2 font-bold text-indigo-400">$</span><input type="number" id="f-orcamento" step="0.01" placeholder="Opcional" class="modern-input !pl-8 border-indigo-500/20 focus:border-indigo-500"></div>
                </div>

                <div class="space-y-2">
                    <label class="text-[10px] font-black uppercase text-slate-500 ml-1 tracking-widest">% Comissão</label>
                    <div class="relative"><input type="number" id="f-comm" value="5" class="modern-input !pr-10"><span class="absolute right-4 top-1/2 -translate-y-1/2 font-bold text-gold">%</span></div>
                </div>
                <div class="space-y-2">
                    <label class="text-[10px] font-black uppercase text-slate-500 ml-1 tracking-widest">Forma Pagt. Prevista</label>
                    <select id="f-metodo" class="modern-input">
                        <option value="Zelle">Zelle</option>
                        <option value="Wire Transfer">Wire Transfer</option>
                        <option value="Dinheiro">Dinheiro (Cash)</option>
                        <option value="CC">Cartão de Crédito (Dedução 3% Net)</option>
                    </select>
                </div>

                <div class="space-y-2">
                    <label class="text-[10px] font-black uppercase text-slate-500 ml-1 tracking-widest">Início</label>
                    <div class="date-container" onclick="this.querySelector('input').showPicker()">
                        <input type="date" id="f-inicio" required class="modern-input relative">
                        <i data-lucide="calendar" class="calendar-icon-overlay w-5 h-5"></i>
                    </div>
                </div>
                <div class="space-y-2">
                    <label class="text-[10px] font-black uppercase text-slate-500 ml-1 tracking-widest">Entrega</label>
                    <div class="date-container" onclick="this.querySelector('input').showPicker()">
                        <input type="date" id="f-entrega" required class="modern-input relative">
                        <i data-lucide="calendar" class="calendar-icon-overlay w-5 h-5"></i>
                    </div>
                </div>
                <div class="col-span-2 space-y-2">
                    <label class="text-[10px] font-black uppercase text-slate-500 ml-1 tracking-widest">Status</label>
                    <select id="f-status" class="modern-input">
                        <option value="Cotação">Cotação</option>
                        <option value="✅ Aprovado">✅ Aprovado</option>
                        <option value="Aguardando Início">Aguardando Início</option>
                        <option value="Em Execução">Em Execução</option>
                        <option value="Finalizado">Finalizado</option>
                    </select>
                </div>
                <div class="col-span-2 flex gap-6 mt-10">
                    <button type="submit" class="flex-1 btn-premium-gold shadow-xl">Salvar Registro</button>
                    <button type="button" onclick="window.cancelEdit(); showView('projects')" class="px-10 text-slate-500 uppercase font-black text-xs hover:text-white transition-all">Cancelar</button>
                </div>
            </form>
        </div>

        <div id="view-users" class="hidden space-y-10 animate-fade-in">
            <div class="glass p-10 max-w-lg mx-auto rounded-[32px] text-left border border-white/5 shadow-2xl">
                <h3 class="text-xl font-black text-gold mb-8 uppercase tracking-tighter" data-i18n="team_title">Gestão de Equipe</h3>
                <form id="team-form" class="space-y-6">
                    <input type="hidden" id="t-id">
                    
                    <div class="space-y-1">
                        <label class="label-auth">Nível de Acesso (Autorização)</label>
                        <select id="t-role" class="modern-input">
                            <option value="editor">Editor Padrão (Pode ver, adicionar e editar obras)</option>
                            <option value="viewer">Somente Leitura (Somente ver relatórios e obras)</option>
                            <option value="admin">Administrador (Total Acesso - Logs, Equipe e Edições)</option>
                        </select>
                    </div>

                    <div class="space-y-1"><label class="label-auth">E-mail</label><input type="email" id="t-email" required class="modern-input"></div>
                    <div class="space-y-1 relative">
                        <label class="label-auth">Senha</label>
                        <input type="password" id="t-pass" required class="modern-input">
                        <button type="button" onclick="window.togglePassword('t-pass', 'eye-team-btn')" class="password-toggle" id="eye-team-btn" style="top:70%"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg></button>
                    </div>

                    <div class="space-y-2 mt-4 pt-4 border-t border-white/10">
                        <div class="flex items-center gap-3 bg-black/30 p-4 rounded-xl border border-white/5">
                            <input type="checkbox" id="t-viewall" class="w-5 h-5 accent-gold cursor-pointer rounded bg-transparent">
                            <label for="t-viewall" class="text-[10px] font-black uppercase text-slate-300 cursor-pointer">Visão Global (Visualizar TODAS as obras)</label>
                        </div>
                        
                        <!-- NOVO: Acesso a Custos -->
                        <div class="flex items-center gap-3 bg-indigo-900/20 p-4 rounded-xl border border-indigo-500/20">
                            <input type="checkbox" id="t-viewcosts" class="w-5 h-5 accent-indigo-500 cursor-pointer rounded bg-transparent">
                            <label for="t-viewcosts" class="text-[10px] font-black uppercase text-indigo-300 cursor-pointer">Acesso ao Centro de Custos e Lucro Real</label>
                        </div>
                    </div>
                    
                    <button type="submit" id="btn-save-team" class="btn-premium-gold shadow-xl" data-i18n="btn_team">Salvar e Autorizar Acesso</button>
                </form>
            </div>

    </main>
</div>

<script type="module">
    import { initializeApp, deleteApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
    import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
    import { getFirestore, collection, doc, updateDoc, addDoc, deleteDoc, onSnapshot, serverTimestamp, arrayUnion } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyDrLfIOuBwZblwKPuxBRK3R4fQpjQQbnDE",
        authDomain: "d2-project-management.firebaseapp.com",
        projectId: "d2-project-management",
        storageBucket: "d2-project-management.firebasestorage.app",
        messagingSenderId: "254630664761",
        appId: "1:254630664761:web:0d3c9c840bde488353cbe8"
    };

    const appId = 'd2-Project-Management';
    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);
    const SUPER_ADMIN = "dante.frota@allcablingtech.com";

    // Modificado: state.showArchived e state.currentUserViewCosts
    let state = { 
        user: null, currentUserRole: 'viewer', currentUserViewAll: false, currentUserViewCosts: false, 
        projects: [], team: [], company: 'Ambas', lang: 'pt', theme: 'dark', 
        editingPayments: null, editingRecs: null, focusedProject: null, showArchived: false 
    };

    // Armazena instâncias de gráficos para destruí-los ao recarregar
    window.d2Charts = {};

    // Helpers UI
    function showLoginError(msg) {
        const box = document.getElementById('login-error-msg');
        const hint = document.getElementById('login-hint-msg');
        if (hint) hint.classList.add('hidden');
        if (box) { box.textContent = msg || 'Falha no login.'; box.classList.remove('hidden'); }
    }
    function showLoginHint(msg) {
        const hint = document.getElementById('login-hint-msg');
        if (!hint) return;
        hint.textContent = msg;
        hint.classList.remove('hidden');
    }
    function hideLoginMessages() {
        document.getElementById('login-error-msg')?.classList.add('hidden');
        document.getElementById('login-hint-msg')?.classList.add('hidden');
    }

    function logAccess(userEmail, action) {
        const logs = JSON.parse(localStorage.getItem('access_logs') || '[]');
        logs.unshift({ timestamp: new Date().toISOString(), user: userEmail, action });
        if (logs.length > 500) logs.splice(500);
        localStorage.setItem('access_logs', JSON.stringify(logs));
        renderLogs(); // Force render if open
    }

    function renderLogs() {
        const tbody = document.getElementById('logs-body');
        if (!tbody) return;
        const logs = JSON.parse(localStorage.getItem('access_logs') || '[]');
        tbody.innerHTML = logs.map(log => `
            <tr class="border-b border-white/5 hover:bg-white/5">
                <td class="py-3 px-4 text-sm whitespace-nowrap">${new Date(log.timestamp).toLocaleString('pt-BR')}</td>
                <td class="py-3 px-4 text-sm font-bold text-gold">${log.user}</td>
                <td class="py-3 px-4 text-sm text-slate-300">${log.action}</td>
            </tr>
        `).join('') || '<tr><td colspan="3" class="py-10 text-center text-slate-500">Nenhum log registrado</td></tr>';
    }

    window.applyPermissions = () => {
        const role = state.currentUserRole;
        const isViewer = role === 'viewer';
        const isEditor = ['editor', 'admin', 'superadmin'].includes(role);
        const isAdmin = ['admin', 'superadmin'].includes(role);

        const roleDisplay = document.getElementById('user-role-display');
        if (roleDisplay) {
            let roleStr = "Modo Leitura";
            if (role === 'superadmin') roleStr = "⭐ Super Admin";
            else if (role === 'admin') roleStr = "Administrador";
            else if (role === 'editor') roleStr = "Editor";
            
            if (state.currentUserViewAll && !isAdmin) roleStr += " (Visão Global)";
            if (state.currentUserViewCosts && !isAdmin) roleStr += " | Custos";
            roleDisplay.innerText = roleStr;
        }

        document.querySelectorAll('.admin-only').forEach(el => {
            if (isAdmin) el.classList.remove('hidden'); else el.classList.add('hidden');
        });

        document.querySelectorAll('.editor-only').forEach(el => {
            if (isEditor) el.classList.remove('hidden'); else el.classList.add('hidden');
        });
        
        if (state.projects.length > 0) {
            renderProjects();
            renderReport();
        }
    };

    function renderVendedores() {
        const select = document.getElementById('f-vendedor');
        if (!select || !state.user) return;
        
        const canViewAll = ['admin', 'superadmin'].includes(state.currentUserRole) || state.currentUserViewAll;
        const currentValue = select.value;

        select.innerHTML = '';
        if (canViewAll) {
            const uniqueEmails = new Set(state.team.map(m => m.email));
            uniqueEmails.add(state.user.email); 
            uniqueEmails.forEach(email => select.innerHTML += `<option value="${email}">${email}</option>`);
        } else {
            select.innerHTML = `<option value="${state.user.email}">${state.user.email}</option>`;
        }

        if (currentValue && Array.from(select.options).some(opt => opt.value === currentValue)) {
            select.value = currentValue;
        } else {
            select.value = state.user.email;
        }
    }

    window.setArchiveFilter = (showArchived) => {
        state.showArchived = showArchived;
        document.getElementById('filter-active').classList.toggle('active', !showArchived);
        document.getElementById('filter-archived').classList.toggle('active', showArchived);
        state.focusedProject = null;
        renderProjects();
    };

    window.toggleArchive = async (id, currentArchivedStatus) => {
        if (!['editor', 'admin', 'superadmin'].includes(state.currentUserRole)) return;
        try {
            const action = currentArchivedStatus ? "Desarquivou" : "Arquivou";
            await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'projects', id), { archived: !currentArchivedStatus });
            logAccess(state.user.email, `${action} a obra ID: ${id}`);
            if (state.focusedProject === id) window.closeProjectDetails();
        } catch (e) { console.error(e); }
    };

    // --- LÓGICA DE CENTRO DE CUSTOS (DESPESAS) ---
    window.addExpense = async (projectId) => {
        if (!state.user || !state.currentUserViewCosts) return;
        
        const date = document.getElementById(`exp-date-${projectId}`)?.value;
        const desc = document.getElementById(`exp-desc-${projectId}`)?.value;
        const cat = document.getElementById(`exp-cat-${projectId}`)?.value;
        const val = document.getElementById(`exp-val-${projectId}`)?.value;

        if (!date || !desc || !cat || !val) { alert('Preencha todos os campos da despesa.'); return; }
        
        const newExpense = {
            id: crypto.randomUUID(),
            data: date,
            descricao: desc,
            categoria: cat,
            valor: parseFloat(val),
            adicionadoPor: state.user.email,
            criadoEm: new Date().toISOString()
        };

        try {
            await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'projects', projectId), { 
                despesas: arrayUnion(newExpense) 
            });
            logAccess(state.user.email, `Adicionou despesa de $${val} (${cat}) na obra ID: ${projectId}`);
        } catch (e) { console.error("Erro ao adicionar despesa:", e); }
    };

    window.deleteExpense = async (projectId, expenseId, expenseDesc, expenseVal) => {
        if (!state.user || !state.currentUserViewCosts) return;
        if (!confirm(`Remover a despesa: ${expenseDesc}?`)) return;

        const p = state.projects.find(x => x.id === projectId);
        if (!p) return;
        
        const updatedExpenses = (p.despesas || []).filter(e => e.id !== expenseId);

        try {
            await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'projects', projectId), { 
                despesas: updatedExpenses 
            });
            logAccess(state.user.email, `Removeu despesa de $${expenseVal} (${expenseDesc}) na obra ID: ${projectId}`);
        } catch (e) { console.error("Erro ao remover despesa:", e); }
    };

    // Renderização dos Gráficos (Chart.js)
    function renderCharts(pId, budget, expensesByCategory, totalExpenses) {
        // Grafico de Budget (Donut)
        const ctxBudget = document.getElementById(`chart-budget-${pId}`);
        if (ctxBudget) {
            if (window.d2Charts[`budget-${pId}`]) window.d2Charts[`budget-${pId}`].destroy();
            
            const remaining = Math.max(0, budget - totalExpenses);
            const overspent = Math.max(0, totalExpenses - budget);
            
            let dataArr, bgColors, labels;
            
            if (budget === 0 && totalExpenses === 0) {
                labels = ['Sem Orçamento']; dataArr = [1]; bgColors = ['#334155'];
            } else if (overspent > 0) {
                labels = ['Orçamento Usado', 'Estouro (Overbudget)']; dataArr = [budget, overspent]; bgColors = ['#fbbf24', '#ef4444'];
            } else {
                labels = ['Gasto', 'Restante']; dataArr = [totalExpenses, remaining]; bgColors = ['#fbbf24', '#10b981'];
            }

            window.d2Charts[`budget-${pId}`] = new Chart(ctxBudget, {
                type: 'doughnut',
                data: { labels: labels, datasets: [{ data: dataArr, backgroundColor: bgColors, borderWidth: 0 }] },
                options: { responsive: true, maintainAspectRatio: false, cutout: '75%', plugins: { legend: { display: false } } }
            });
        }

        // Gráfico de Categoria (Barras)
        const ctxCat = document.getElementById(`chart-cat-${pId}`);
        if (ctxCat) {
            if (window.d2Charts[`cat-${pId}`]) window.d2Charts[`cat-${pId}`].destroy();
            
            const labels = Object.keys(expensesByCategory);
            const dataArr = Object.values(expensesByCategory);
            
            window.d2Charts[`cat-${pId}`] = new Chart(ctxCat, {
                type: 'bar',
                data: { labels: labels, datasets: [{ label: 'Gastos', data: dataArr, backgroundColor: '#818cf8', borderRadius: 4 }] },
                options: { 
                    responsive: true, maintainAspectRatio: false, 
                    plugins: { legend: { display: false } },
                    scales: { 
                        y: { beginAtZero: true, grid: { color: 'rgba(255,255,255,0.05)' }, ticks: { color: '#94a3b8', font: {size: 9} } },
                        x: { grid: { display: false }, ticks: { color: '#94a3b8', font: {size: 9} } }
                    }
                }
            });
        }
    }


    // --- LÓGICA DE PAGAMENTOS E RECEBIMENTOS (MANTIDA INTACTA) ---
    window.openEditPaymentModal = (projectId) => {
        const p = state.projects.find(x => x.id === projectId);
        if (!p) return;
        state.editingPayments = { projectId, payments: [...(p.pagamentosEfetuados || [])] };
        renderPaymentEditList();
        document.getElementById('edit-payment-modal').classList.add('active');
    };
    window.closeEditPaymentModal = () => { state.editingPayments = null; document.getElementById('edit-payment-modal').classList.remove('active'); };
    function renderPaymentEditList() {
        const container = document.getElementById('payment-edit-list');
        if (!container || !state.editingPayments) return;
        container.innerHTML = state.editingPayments.payments.map((pay, i) => `<div class="flex items-center gap-4 p-4 bg-white/5 rounded-xl border border-white/10"><input type="date" value="${pay.data || ''}" onchange="updatePaymentField(${i}, 'data', this.value)" class="modern-input relative flex-1"><input type="number" step="0.01" value="${(pay.valor ?? 0)}" onchange="updatePaymentField(${i}, 'valor', this.value)" class="modern-input flex-1"><button onclick="removePaymentFromEdit(${i})" class="p-2 bg-red-500/20 text-red-400 rounded-lg hover:bg-red-500/30"><i data-lucide="trash-2" class="w-5 h-5"></i></button></div>`).join('') + `<button onclick="addNewPaymentToEdit()" class="w-full p-4 border-2 border-dashed border-gold/30 rounded-xl text-gold font-bold hover:bg-gold/10 transition-all">+ Adicionar Novo Pagamento</button>`;
        try { lucide.createIcons(); } catch {}
    }
    window.updatePaymentField = (index, field, value) => { if (!state.editingPayments) return; if (field === 'data') state.editingPayments.payments[index].data = value; if (field === 'valor') state.editingPayments.payments[index].valor = parseFloat(value || 0); };
    window.removePaymentFromEdit = (index) => { if (!confirm('Remover este pagamento?')) return; state.editingPayments.payments.splice(index, 1); renderPaymentEditList(); };
    window.addNewPaymentToEdit = () => { if (!state.editingPayments) return; state.editingPayments.payments.push({ data: new Date().toISOString().split('T')[0], valor: 0 }); renderPaymentEditList(); };
    window.saveEditedPayments = async () => { if (!state.editingPayments) return; try { await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'projects', state.editingPayments.projectId), { pagamentosEfetuados: state.editingPayments.payments }); closeEditPaymentModal(); } catch (e) { alert('Erro ao salvar pagamentos: ' + e.message); } };
    window.addPayment = async (projectId) => { if (!state.user) return; const v = document.getElementById(`pay-val-${projectId}`)?.value; const d = document.getElementById(`pay-date-${projectId}`)?.value; if (!v || !d) { alert('Preencha data e valor para o vendedor.'); return; } try { await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'projects', projectId), { pagamentosEfetuados: arrayUnion({ valor: parseFloat(v), data: d }) }); logAccess(state.user.email, `Pagou vendedor $${v} na obra ID: ${projectId}`); } catch (e) { console.error(e); } };

    window.openEditRecModal = (projectId) => { const p = state.projects.find(x => x.id === projectId); if (!p) return; state.editingRecs = { projectId, recs: [...(p.recebimentos || [])] }; renderRecEditList(); document.getElementById('edit-rec-modal').classList.add('active'); };
    window.closeEditRecModal = () => { state.editingRecs = null; document.getElementById('edit-rec-modal').classList.remove('active'); };
    function renderRecEditList() {
        const container = document.getElementById('rec-edit-list');
        if (!container || !state.editingRecs) return;
        container.innerHTML = state.editingRecs.recs.map((r, i) => `<div class="flex items-center gap-2 p-3 bg-white/5 rounded-xl border border-white/10 flex-wrap sm:flex-nowrap"><input type="date" value="${r.data || ''}" onchange="updateRecField(${i}, 'data', this.value)" class="modern-input relative flex-1 !p-2 !text-xs"><input type="number" step="0.01" value="${(r.valor ?? 0)}" onchange="updateRecField(${i}, 'valor', this.value)" class="modern-input w-24 !p-2 !text-xs"><select onchange="updateRecField(${i}, 'metodo', this.value)" class="modern-input w-28 !p-2 !text-xs"><option value="Zelle" ${r.metodo==='Zelle'?'selected':''}>Zelle</option><option value="Wire Transfer" ${r.metodo==='Wire Transfer'?'selected':''}>Wire</option><option value="Dinheiro" ${r.metodo==='Dinheiro'?'selected':''}>Cash</option><option value="CC" ${r.metodo==='CC'?'selected':''}>Cartão</option></select><button onclick="removeRecFromEdit(${i})" class="p-2 bg-red-500/20 text-red-400 rounded-lg hover:bg-red-500/30"><i data-lucide="trash-2" class="w-4 h-4"></i></button></div>`).join('') + `<button onclick="addNewRecToEdit()" class="w-full p-4 border-2 border-dashed border-emerald-500/30 rounded-xl text-emerald-400 font-bold hover:bg-emerald-500/10 transition-all">+ Adicionar Novo Recebimento</button>`;
        try { lucide.createIcons(); } catch {}
    }
    window.updateRecField = (index, field, value) => { if (!state.editingRecs) return; if (field === 'data') state.editingRecs.recs[index].data = value; if (field === 'valor') state.editingRecs.recs[index].valor = parseFloat(value || 0); if (field === 'metodo') state.editingRecs.recs[index].metodo = value; };
    window.removeRecFromEdit = (index) => { if (!confirm('Remover este recebimento?')) return; state.editingRecs.recs.splice(index, 1); renderRecEditList(); };
    window.addNewRecToEdit = () => { if (!state.editingRecs) return; state.editingRecs.recs.push({ data: new Date().toISOString().split('T')[0], valor: 0, metodo: 'Zelle' }); renderRecEditList(); };
    window.saveEditedRecs = async () => { if (!state.editingRecs) return; try { await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'projects', state.editingRecs.projectId), { recebimentos: state.editingRecs.recs }); closeEditRecModal(); } catch (e) { alert('Erro ao salvar: ' + e.message); } };
    window.addRecebimento = async (projectId) => { if (!state.user) return; const v = document.getElementById(`rec-val-${projectId}`)?.value; const d = document.getElementById(`rec-date-${projectId}`)?.value; const m = document.getElementById(`rec-met-${projectId}`)?.value; if (!v || !d || !m) { alert('Preencha data, valor e método para o recebimento.'); return; } try { await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'projects', projectId), { recebimentos: arrayUnion({ valor: parseFloat(v), data: d, metodo: m }) }); logAccess(state.user.email, `Registrou recebimento $${v} na obra ID: ${projectId}`); } catch (e) { console.error(e); } };

    const formatCurr = (v) => new Intl.NumberFormat('en-US', { style: 'currency', currency: 'USD', minimumFractionDigits: 2 }).format(Number(v || 0));

    window.togglePassword = (inputId, btnId) => {
        const el = document.getElementById(inputId); const btn = document.getElementById(btnId);
        if (el && btn) { const isPass = el.type === 'password'; el.type = isPass ? 'text' : 'password'; btn.innerHTML = isPass ? '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"></path><line x1="1" y1="1" x2="23" y2="23"></line></svg>' : '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>'; }
    };

    window.setLang = (l) => {
        state.lang = l;
        document.querySelectorAll('.flag-btn').forEach(b => b.classList.toggle('active', b.id.includes(l)));
        renderProjects(); renderReport();
    };

    window.selectUnit = (unit) => {
        state.company = unit;
        document.querySelectorAll('.unit-pill').forEach(b => b.classList.remove('active'));
        const map = { 'Smart Home': 'unit-smart', 'HVAC': 'unit-hvac', 'Ambas': 'unit-all' };
        document.getElementById(map[unit]).classList.add('active');
        state.focusedProject = null;
        renderProjects(); renderReport();
    };

    window.toggleTheme = () => {
        state.theme = state.theme === 'dark' ? 'light' : 'dark';
        const appDiv = document.getElementById('main-app');
        if (appDiv) appDiv.className = state.theme === 'dark' ? 'min-h-screen flex flex-col app-body-dark text-center' : 'min-h-screen flex flex-col app-body-light light text-center';
        const sun = document.getElementById('theme-icon-light'); const moon = document.getElementById('theme-icon-dark');
        if (sun && moon) { if (state.theme === 'dark') { sun.classList.add('hidden'); moon.classList.remove('hidden'); } else { moon.classList.add('hidden'); sun.classList.remove('hidden'); } }
        try { lucide.createIcons(); } catch {}
    };

    window.openProjectDetails = (id) => { state.focusedProject = id; renderProjects(); window.scrollTo({ top: 0, behavior: 'smooth' }); };
    window.closeProjectDetails = () => { state.focusedProject = null; renderProjects(); window.scrollTo({ top: 0, behavior: 'smooth' }); };
    window.printReport = () => { window.print(); };

    window.editTeamMember = (id, email, pass, role, viewAll, viewCosts) => {
        document.getElementById('t-id').value = id;
        document.getElementById('t-email').value = email;
        document.getElementById('t-pass').value = pass;
        document.getElementById('t-role').value = role || 'editor';
        document.getElementById('t-viewall').checked = viewAll === true || String(viewAll) === 'true';
        document.getElementById('t-viewcosts').checked = viewCosts === true || String(viewCosts) === 'true';
        window.scrollTo({ top: 0, behavior: 'smooth' });
    };

    window.editP = (id) => {
        const p = state.projects.find(x => x.id === id);
        if (!p) return;
        renderVendedores();
        const vendSelect = document.getElementById('f-vendedor');
        if (p.vendedor && !Array.from(vendSelect.options).some(opt => opt.value === p.vendedor)) { vendSelect.innerHTML += `<option value="${p.vendedor}">${p.vendedor} (Cadastro Antigo)</option>`; }
        document.getElementById('edit-id').value = id;
        document.getElementById('f-proposta').value = p.numeroProposta || '';
        document.getElementById('f-invoice').value = p.numeroInvoice || '';
        document.getElementById('f-empresa').value = p.empresa || 'Smart Home';
        document.getElementById('f-cliente').value = p.cliente || '';
        document.getElementById('f-vendedor').value = p.vendedor || '';
        document.getElementById('f-valor').value = p.valorTotal ?? '';
        document.getElementById('f-orcamento').value = p.orcamento ?? ''; // NOVO: Orçamento
        document.getElementById('f-comm').value = p.percComissao ?? 5;
        document.getElementById('f-metodo').value = p.metodo || 'Zelle';
        document.getElementById('f-inicio').value = p.dataInicio || '';
        document.getElementById('f-entrega').value = p.dataEntrega || '';
        document.getElementById('f-status').value = p.status || 'Cotação';
        window.showView('new');
    };

    window.cancelEdit = () => {
        const form = document.getElementById('project-form'); if (form) form.reset();
        document.getElementById('edit-id').value = '';
        const fVendedor = document.getElementById('f-vendedor'); if (fVendedor && state.user) fVendedor.value = state.user.email;
    };

    window.showView = (v) => {
        ['projects', 'new', 'reports', 'users', 'logs'].forEach(id => {
            const el = document.getElementById('view-' + id); const tab = document.getElementById('tab-' + id);
            if (el) el.classList.add('hidden'); if (tab) tab.classList.remove('tab-active');
        });
        const tv = document.getElementById('view-' + v); const tt = document.getElementById('tab-' + v);
        if (tv) tv.classList.remove('hidden'); if (tt) tt.classList.add('tab-active');

        if (v === 'logs') renderLogs();
        if (v === 'projects') { state.focusedProject = null; renderProjects(); }
        try { lucide.createIcons(); } catch {}
    };

    window.handleLogout = () => signOut(auth).then(() => location.reload()).catch(console.error);

    function getFin(p) {
        const percComissao = Number(p?.percComissao || 0) / 100;
        const valorTotal = Number(p?.valorTotal || 0);
        const orcamento = Number(p?.orcamento || 0);

        const globalMetodo = String(p?.metodo || '');
        const globalIsCC = (globalMetodo === 'CC' || globalMetodo.toLowerCase().includes('cartão'));
        const baseProjetada = globalIsCC ? valorTotal * 0.97 : valorTotal;
        const commTotalProjetada = baseProjetada * percComissao;

        const recebimentos = Array.isArray(p?.recebimentos) ? p.recebimentos : [];
        let totalRecebido = 0; let commLiberada = 0;
        
        recebimentos.forEach(r => {
            const rVal = Number(r.valor || 0); totalRecebido += rVal;
            const rBase = (r.metodo === 'CC') ? rVal * 0.97 : rVal;
            commLiberada += rBase * percComissao;
        });

        const pays = Array.isArray(p?.pagamentosEfetuados) ? p.pagamentosEfetuados : [];
        const totalPaid = pays.reduce((a, c) => a + Number(c?.valor || 0), 0);
        const balance = commLiberada - totalPaid;
        
        let statusColor = "bg-red-500";
        if (balance < 0) statusColor = "bg-blue-500"; 
        else if (balance === 0 && commLiberada > 0) statusColor = "bg-emerald-500";
        else if (totalPaid > 0) statusColor = "bg-orange-500"; 

        // DESPESAS
        const despesas = Array.isArray(p?.despesas) ? p.despesas : [];
        let totalDespesas = 0;
        let gastosPorCategoria = { 'Materiais': 0, 'Mão-de-obra': 0, 'Equipamentos': 0, 'Licenças': 0, 'Outros': 0 };
        
        despesas.forEach(d => {
            const val = Number(d.valor || 0);
            totalDespesas += val;
            if (gastosPorCategoria[d.categoria] !== undefined) { gastosPorCategoria[d.categoria] += val; } 
            else { gastosPorCategoria['Outros'] += val; }
        });

        const lucroBruto = valorTotal - totalDespesas;
        const margemLucro = valorTotal > 0 ? (lucroBruto / valorTotal) * 100 : 0;

        return { baseProjetada, commTotalProjetada, totalRecebido, commLiberada, totalPaid, balance, statusColor, globalIsCC, orcamento, totalDespesas, lucroBruto, margemLucro, gastosPorCategoria };
    }

    function renderProjects() {
        const grid = document.getElementById('projects-grid');
        const filtersDiv = document.getElementById('projects-filters');
        if (!grid || !state.user) return;

        const isEditor = ['editor', 'admin', 'superadmin'].includes(state.currentUserRole);

        const canViewCosts = isAdmin || state.currentUserViewCosts;

            grid.innerHTML += `

            const s = new Date(p.dataInicio).getTime(); const e = new Date(p.dataEntrega).getTime(); const n = Date.now();
            let prog = (Number.isFinite(s) && Number.isFinite(e) && e > s) ? (n >= s ? (n > e ? 100 : Math.floor(((n - s) / (e - s)) * 100)) : 0) : 0;
            let r, g; if (prog < 50) { r = (prog * 5.1); g = 255; } else { r = 255; g = (255 - (prog - 50) * 5.1); }
            let colorHex = `rgb(${Math.floor(r)}, ${Math.floor(g)}, 0)`;

            if (sellerPaidPerc > 100) sellerPaidPerc = 100;

            const clientPaidText = clientPaidPerc >= 100 ? '100% PAGO' : (clientPaidPerc > 0 ? `${clientPaidPerc}% PAGO` : 'PENDENTE');
            const clientPaidColor = clientPaidPerc >= 100 ? 'text-emerald-400' : (clientPaidPerc > 0 ? 'text-orange-400' : 'text-slate-500');
            const clientBorderColor = clientPaidPerc >= 100 ? 'border-emerald-500/30 bg-emerald-500/10' : 'border-white/5 bg-black/20';

            const sellerPaidText = sellerPaidPerc >= 100 ? '100% PAGO' : (sellerPaidPerc > 0 ? `${sellerPaidPerc}% PAGO` : 'PENDENTE');

                            </div>
                            <button onclick="window.addRecebimento('${p.id}')" class="w-full btn-premium-gold !py-2 !text-[9px] bg-emerald-500 !text-emerald-950 flex items-center justify-center gap-2 hover:brightness-110 no-print"><i data-lucide="arrow-down-to-line" class="w-3 h-3"></i> Lançar Recebimento</button>
                            ` : ''}
                        </div>

                        <div class="space-y-3 pt-4 border-t border-white/5 print:border-slate-200">
                            <div class="flex justify-between items-center bg-gold/10 p-2 px-3 rounded-lg border border-gold/20 print:bg-amber-50 print:border-amber-200">
                                <p class="text-[9px] font-black text-gold uppercase print:text-amber-800">Pagamentos ao Vendedor</p>
                                ${isAdmin ? `<button onclick="openEditPaymentModal('${p.id}')" class="text-[9px] font-bold text-gold hover:text-white transition-colors no-print">✏️</button>` : ''}
                            </div>
                            <div class="max-h-32 overflow-y-auto scrollbar-hide px-1 print:max-h-none">
                                ${(p.pagamentosEfetuados || []).map(pay => `<div class="flex justify-between text-[11px] py-1.5 border-b border-white/5 last:border-0 print:border-slate-200"><span class="text-slate-300 print:text-black">${pay.data ? new Date(pay.data + 'T12:00:00').toLocaleDateString() : '-'}</span><span class="font-black text-gold print:text-amber-700">- ${formatCurr(pay.valor)}</span></div>`).join('') || '<p class="text-[10px] italic text-slate-600 text-center py-2">Nenhum pagamento</p>'}
                            </div>
                            ${isAdmin ? `
                            <div class="grid grid-cols-2 gap-2 mt-2 no-print">
                                <input type="date" id="pay-date-${p.id}" class="modern-input relative !px-2 !py-2 h-8 text-[10px]"><input type="number" id="pay-val-${p.id}" placeholder="$" class="modern-input !px-2 !py-2 h-8 text-[10px]">
                            </div>
                            <button onclick="window.addPayment('${p.id}')" class="w-full btn-premium-gold !py-2 !text-[9px] flex items-center justify-center gap-2 hover:brightness-110 no-print"><i data-lucide="arrow-up-from-line" class="w-3 h-3"></i> Lançar Pagamento ao Vendedor</button>
                            ` : ''}
                        </div>
                    </div>
                    
                    <!-- Bloco Centro de Custos -->
                    ${costsUI}
                </div>
                ` : ``}
            </div>`;

            // Agenda a renderização dos gráficos se o painel estiver aberto e os gráficos existirem
            if (isFocused && canViewCosts) {
                setTimeout(() => renderCharts(p.id, f.orcamento, f.gastosPorCategoria, f.totalDespesas), 100);
            }
        });

        try { lucide.createIcons(); } catch {}
    }

    function renderReport() {
        const out = document.getElementById('report-output');
        if (!out || !state.user) return;

        const canViewAll = ['admin', 'superadmin'].includes(state.currentUserRole) || state.currentUserViewAll;
        const canViewCosts = ['admin', 'superadmin'].includes(state.currentUserRole) || state.currentUserViewCosts;

        // Note: No relatório mantemos apenas ativas por padrão ou permitimos todas? Filtramos só as Ativas para o relatorio de comissoes e lucros.
        const filtered = state.projects.filter(p => {
            const matchCompany = state.company === 'Ambas' || p.empresa === state.company;
            const matchUser = canViewAll || p.vendedor === state.user.email; 
            return matchCompany && matchUser && !p.archived; // Relatorio ignora arquivadas
        });

        let tv = 0, tc = 0, tProfit = 0; 

        const currentYear = new Date().getFullYear();
        const monthNames = state.lang === 'en' ? ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'] : ['Jan','Fev','Mar','Abr','Mai','Jun','Jul','Ago','Set','Out','Nov','Dez'];
        const sellerStats = {};

        const rows = filtered.map(p => {
            const f = getFin(p);
            tv += Number(p.valorTotal || 0);
            tc += Number(f.commLiberada || 0); 
            if (canViewCosts) tProfit += Number(f.lucroBruto || 0);

            const vend = p.vendedor || 'Sem Vendedor';
            if (!sellerStats[vend]) { sellerStats[vend] = { total: 0, months: Array(12).fill(0) }; }

            const recebimentos = p.recebimentos || [];
            recebimentos.forEach(r => {
                if (r.data) {
                    const rYear = parseInt(r.data.split('-')[0], 10);
                    const rMonth = parseInt(r.data.split('-')[1], 10) - 1;
                    const rBase = r.metodo === 'CC' ? r.valor * 0.97 : r.valor;
                    const rComm = rBase * (p.percComissao / 100);
                    if (rYear === currentYear) { sellerStats[vend].months[rMonth] += rComm; sellerStats[vend].total += rComm; }
                }
            });

            // Coluna de Lucro só aparece se tiver viewCosts
            const profitCol = canViewCosts ? `<td class="p-4 text-right font-black ${f.lucroBruto >= 0 ? 'text-emerald-500' : 'text-red-500'}">${formatCurr(f.lucroBruto)}</td>` : '';

            return `<tr class="border-b border-slate-100 text-xs text-left text-slate-800">
                <td class="p-4 font-mono text-[10px]">${p.numeroProposta || '-'} / ${p.numeroInvoice || '-'}</td>
                <td class="p-4 font-black uppercase">${p.cliente || ''}</td>
                <td class="p-4">${p.vendedor?.split('@')[0] || ''}</td>
                <td class="p-4 text-right">${formatCurr(p.valorTotal)}</td>
                <td class="p-4 text-right font-black text-emerald-600">${formatCurr(f.totalRecebido)}</td>
                <td class="p-4 text-right font-black text-amber-600">${formatCurr(f.commLiberada)}</td>
                ${profitCol}
            </tr>`;
        }).join('');

        let summaryRows = Object.keys(sellerStats).sort().map(vend => {
            const stats = sellerStats[vend];
            let monthsHtml = stats.months.map(mVal => `<td class="p-3 text-right ${mVal > 0 ? 'text-amber-600 font-bold' : 'text-slate-300'}">${formatCurr(mVal)}</td>`).join('');
            return `<tr class="border-b border-slate-100 text-[10px] text-slate-800"><td class="p-3 font-black uppercase whitespace-nowrap">${vend.split('@')[0]}</td>${monthsHtml}<td class="p-3 text-right font-black text-emerald-600 bg-slate-50">${formatCurr(stats.total)}</td></tr>`;
        }).join('');

        let summaryHeaderMonths = monthNames.map(m => `<th class="p-3 text-right">${m}</th>`).join('');

        out.innerHTML = `<div class="bg-white text-slate-950 p-8 md:p-12 rounded-[50px] shadow-2xl border-8 border-slate-50 text-left">
            <div class="flex justify-between items-center border-b-[8px] border-slate-950 pb-10 mb-10">
                <div class="logo-frame-sm border p-2 rounded-xl"><img src="logo-D2-Group-preto.png" class="h-12"></div>
                <div class="text-right">
                    <h2 class="text-3xl font-black uppercase tracking-tighter">Relatório Executivo</h2>
                    <p class="text-slate-400 font-black uppercase text-[10px]">${new Date().toLocaleDateString()}</p>
                </div>
            </div>
            
            <div class="mb-12">
                <h3 class="text-lg font-black uppercase tracking-tighter mb-4 text-slate-800">Comissões Reais - Pagas por Mês (${currentYear})</h3>
                <div class="overflow-x-auto border border-slate-100 rounded-2xl">
                    <table class="w-full">
                        <thead class="bg-slate-50 border-b border-slate-100">
                            <tr class="font-black uppercase text-[9px] text-slate-500 text-left"><th class="p-3">Vendedor</th>${summaryHeaderMonths}<th class="p-3 text-right bg-slate-100">Total Ano</th></tr>
                        </thead>
                        <tbody>${summaryRows || `<tr><td colspan="14" class="p-4 text-center text-slate-400">Nenhum dado para o ano atual.</td></tr>`}</tbody>
                    </table>
                </div>
            </div>
            
            <h3 class="text-lg font-black uppercase tracking-tighter mb-4 text-slate-800">Detalhamento de Obras Ativas</h3>
            <div class="overflow-x-auto border border-slate-100 rounded-2xl">
                <table class="w-full">
                    <thead class="bg-slate-50 border-b border-slate-100">
                        <tr class="font-black uppercase text-[9px] text-slate-500 text-left">
                            <th class="p-4">Prop / Invoice</th><th class="p-4">Obra</th><th class="p-4">Vendedor</th>
                            <th class="p-4 text-right">Contrato Bruto</th><th class="p-4 text-right bg-emerald-50 text-emerald-700">Total Recebido</th>
                            <th class="p-4 text-right bg-amber-50 text-amber-700">Com. Liberada</th>
                            ${canViewCosts ? '<th class="p-4 text-right bg-indigo-50 text-indigo-700">Lucro Real</th>' : ''}
                        </tr>
                    </thead>
                    <tbody>${rows}</tbody>
                </table>
            </div>
            <div class="mt-10 pt-10 border-t-[8px] border-slate-950 flex flex-wrap justify-end gap-10 sm:gap-16">
                <div class="text-right">
                    <p class="text-[11px] font-black uppercase text-slate-400 mb-1">TOTAL CONTRATOS</p>
                    <p class="text-4xl font-black">${formatCurr(tv)}</p>
                </div>
                <div class="text-right">
                    <p class="text-[11px] font-black uppercase text-amber-600 mb-1">COMISSÕES GERADAS</p>
                    <p class="text-4xl font-black text-amber-600">${formatCurr(tc)}</p>
                </div>
                ${canViewCosts ? `
                <div class="text-right">
                    <p class="text-[11px] font-black uppercase text-indigo-600 mb-1">LUCRO TOTAL</p>
                    <p class="text-4xl font-black text-indigo-600">${formatCurr(tProfit)}</p>
                </div>
                ` : ''}
            </div>
        </div>`;
    }

    onAuthStateChanged(auth, (u) => {
        state.user = u;
        if (u) {
            document.getElementById('auth-screen').classList.add('hidden'); document.getElementById('main-app').classList.remove('hidden'); document.body.className = 'app-body-dark';
            document.getElementById('user-display').innerText = u.email ? u.email.split('@')[0].toUpperCase() : "USR";
            initData(); logAccess(u.email, 'Fez login no sistema');
        } else {
            document.getElementById('auth-screen').classList.remove('hidden'); document.getElementById('main-app').classList.add('hidden'); document.body.className = 'auth-body';
        }
        window.setLang(state.lang); try { lucide.createIcons(); } catch {}
    });

    function initData() {
        if (!auth.currentUser) return;
        const projectsRef = collection(db, 'artifacts', appId, 'public', 'data', 'projects');
        onSnapshot(projectsRef, snap => {
            state.projects = snap.docs.map(d => ({ id: d.id, ...d.data() }));
            renderProjects(); renderReport();
        }, err => console.error(err));

        onSnapshot(collection(db, 'artifacts', appId, 'public', 'data', 'user_credentials'), snap => {
            if (!auth.currentUser) return; 
            const team = snap.docs.map(d => ({ id: d.id, ...d.data() })); state.team = team;
            
            if (auth.currentUser.email.toLowerCase() === SUPER_ADMIN.toLowerCase()) {
                state.currentUserRole = 'superadmin'; state.currentUserViewAll = true; state.currentUserViewCosts = true;
            } else {
                const myProfile = team.find(u => u.email.toLowerCase() === auth.currentUser.email.toLowerCase());
                if (!myProfile) { alert("Acesso Negado."); signOut(auth); return; }
                state.currentUserRole = myProfile?.role || 'viewer';
                state.currentUserViewAll = myProfile?.viewAll || false;
                state.currentUserViewCosts = myProfile?.viewCosts || false;
            }
            window.applyPermissions(); renderVendedores();

            const container = document.getElementById('users-list');
            if (container && ['admin', 'superadmin'].includes(state.currentUserRole)) {
                container.innerHTML = team.map(u => {
                    let roleStr = "Editor Padrão", roleClass = "role-editor";
                    if(u.role === 'admin' || u.email.toLowerCase() === SUPER_ADMIN.toLowerCase()) { roleStr = "Admin"; roleClass = "role-admin"; }
                    if(u.role === 'viewer') { roleStr = "Modo Leitura"; roleClass = "role-viewer"; }
                    const tagViewAll = u.viewAll ? '<span class="role-tag bg-indigo-500/20 text-indigo-400 ml-1">VISÃO GLOBAL</span>' : '';
                    const tagCosts = u.viewCosts ? '<span class="role-tag bg-emerald-500/20 text-emerald-400 ml-1">CUSTOS</span>' : '';
                    return `<div class="glass p-6 rounded-[24px] flex justify-between items-center border-l-8 border-gold shadow-lg transition-all hover:scale-[1.01]"><div class="text-left"><p class="font-black text-slate-100 text-lg flex items-center gap-2 flex-wrap">${u.email} <span class="role-tag ${roleClass}">${roleStr}</span> ${tagViewAll} ${tagCosts}</p><p class="text-[11px] text-slate-500 mt-1 uppercase tracking-widest">Senha: <span class="text-gold font-bold normal-case">${u.password}</span></p></div><div class="flex gap-2"><button onclick="window.editTeamMember('${u.id}', '${u.email}', '${u.password}', '${u.role}', ${!!u.viewAll}, ${!!u.viewCosts})" class="p-2 text-gold hover:bg-gold/10 rounded-lg"><i data-lucide="edit" size="18"></i></button><button onclick="window.deleteTeam('${u.id}')" class="p-2 text-red-500 hover:bg-red-500/10 rounded-lg ${u.email.toLowerCase() === SUPER_ADMIN.toLowerCase() ? 'hidden' : ''}"><i data-lucide="user-minus" size="18"></i></button></div></div>`;
                }).join('');
                try { lucide.createIcons(); } catch {}
            }
        });
    }

    document.addEventListener('DOMContentLoaded', () => {
        try { lucide.createIcons(); } catch {}

        document.getElementById('login-form').onsubmit = async (e) => {
            e.preventDefault(); hideLoginMessages(); const btn = document.getElementById('btn-entrar'); btn.disabled = true;
            const email = document.getElementById('email').value.trim(); const pass = document.getElementById('password').value;
            try {
                await signInWithEmailAndPassword(auth, email, pass);
            } catch (err) {
                if (err?.code === 'auth/invalid-credential' || err?.code === 'auth/user-not-found') {
                    try { await createUserWithEmailAndPassword(auth, email, pass); return; } 
                    catch (createErr) { if (createErr.code === 'auth/email-already-in-use') showLoginError('Senha incorreta.'); else showLoginError('Dados inválidos.'); }
                } else if (err?.code === 'auth/unauthorized-domain') { showLoginError('Domínio não autorizado.'); } 
                else { showLoginError('Falha no login: ' + err.message); }
            } finally { btn.disabled = false; }
        };

        document.getElementById('project-form').onsubmit = async (e) => {
            e.preventDefault(); if (!auth.currentUser) return;
            const id = document.getElementById('edit-id').value;
            const d = {
                numeroProposta: document.getElementById('f-proposta').value || '', numeroInvoice: document.getElementById('f-invoice').value || '',
                empresa: document.getElementById('f-empresa').value, cliente: document.getElementById('f-cliente').value, vendedor: document.getElementById('f-vendedor').value,
                valorTotal: parseFloat(document.getElementById('f-valor').value),
                orcamento: parseFloat(document.getElementById('f-orcamento').value || 0), // NOVO CAMPO
                metodo: document.getElementById('f-metodo').value, percComissao: parseInt(document.getElementById('f-comm').value),
                dataInicio: document.getElementById('f-inicio').value, dataEntrega: document.getElementById('f-entrega').value,
                status: document.getElementById('f-status').value, updatedAt: serverTimestamp()
            };

            try {
                if (id) { await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'projects', id), d); logAccess(state.user.email, `Editou a obra: ${d.cliente}`); } 
                else { await addDoc(collection(db, 'artifacts', appId, 'public', 'data', 'projects'), { ...d, archived: false, createdAt: serverTimestamp(), pagamentosEfetuados: [], recebimentos: [], despesas: [] }); logAccess(state.user.email, `Registou nova obra: ${d.cliente}`); }
                e.target.reset(); document.getElementById('edit-id').value = ''; document.getElementById('f-vendedor').value = auth.currentUser.email; window.showView('projects');
            } catch (err) { console.error(err); }
        };

        document.getElementById('team-form').onsubmit = async (e) => {
            e.preventDefault(); if (!auth.currentUser) return;
            const id = document.getElementById('t-id').value; const mail = document.getElementById('t-email').value.trim();
            const pass = document.getElementById('t-pass').value; const role = document.getElementById('t-role').value;
            const viewAll = document.getElementById('t-viewall').checked; 
            const viewCosts = document.getElementById('t-viewcosts').checked; // NOVO CAMPO

            try {
                try { const secApp = initializeApp(firebaseConfig, "SecApp_" + Date.now()); const secAuth = getAuth(secApp); await createUserWithEmailAndPassword(secAuth, mail, pass); await signOut(secAuth); await deleteApp(secApp); } catch (authErr) {}
                if (!id) { await addDoc(collection(db, 'artifacts', appId, 'public', 'data', 'user_credentials'), { email: mail, password: pass, role: role, viewAll: viewAll, viewCosts: viewCosts, updatedAt: serverTimestamp() }); logAccess(state.user.email, `Adicionou utilizador: ${mail}`); } 
                else { await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'user_credentials', id), { email: mail, password: pass, role: role, viewAll: viewAll, viewCosts: viewCosts, updatedAt: serverTimestamp() }); logAccess(state.user.email, `Atualizou utilizador: ${mail}`); }
                e.target.reset(); document.getElementById('t-id').value = ''; document.getElementById('t-viewall').checked = false; document.getElementById('t-viewcosts').checked = false;
            } catch (err) { alert("Erro: " + err.message); }
        };
    });
</script>
</body>
</html>
