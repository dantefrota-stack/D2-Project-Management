<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>D2 Project Management - Premium Official</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root { --gold: #fbbf24; --gold-dark: #b45309; --d2-blue: #0f172a; }
        body { font-family: 'Inter', sans-serif; transition: background-color 0.3s, color 0.3s; margin: 0; }
        .auth-body { background-color: #f1f5f9; color: #0f172a; display: flex; align-items: center; justify-content: center; min-height: 100vh; }
        .auth-card { background: white; border-radius: 40px; width: 100%; max-width: 440px; padding: 48px; box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.1); text-align: center; }
        .logo-box { background: var(--d2-blue); border-radius: 20px; padding: 20px; display: inline-block; margin-bottom: 24px; }
        .label-auth { font-size: 12px; font-weight: 800; color: #64748b; text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 6px; display: block; text-align: left; }
        .auth-input { width: 100%; padding: 16px 20px; border-radius: 12px; background: #f8fafc; border: 1px solid #e2e8f0; color: #0f172a; outline: none; transition: all 0.2s; font-size: 16px; }
        .auth-input:focus { border-color: var(--gold); box-shadow: 0 0 0 4px rgba(251, 191, 36, 0.1); }
        .btn-access { width: 100%; background: var(--d2-blue); color: white; padding: 18px; border-radius: 14px; font-weight: 800; text-transform: uppercase; letter-spacing: 0.1em; transition: all 0.3s; margin-top: 10px; border: none; cursor: pointer; font-size: 14px; }
        .btn-access:hover { transform: translateY(-2px); box-shadow: 0 10px 20px rgba(15, 23, 42, 0.2); }

        .app-body-dark { background-color: #030508; color: #f1f5f9; }
        .app-body-light { background-color: #f8fafc; color: #0f172a; }
        .app-body-light .glass { background: #ffffff !important; border-color: #e2e8f0 !important; color: #0f172a !important; box-shadow: 0 10px 30px -10px rgba(0,0,0,0.1) !important;}
        .app-body-light .glass .text-white:not(.kpi-card *):not(.force-white-text):not(.force-dark-bg) { color: #0f172a !important; }
        .force-white-text { color: #ffffff !important; }
        
        .app-body-light .glass .text-slate-200:not(.force-dark-bg), .app-body-light .glass .text-slate-300:not(.force-dark-bg) { color: #334155 !important; }
        .app-body-light .glass .text-slate-400:not(.force-dark-bg) { color: #475569 !important; }
        .app-body-light .glass .text-slate-500:not(.force-dark-bg) { color: #64748b !important; }
        .app-body-light .glass .text-gold:not(.force-dark-bg) { color: #b45309 !important; } 
        .app-body-light .glass .text-emerald-400:not(.force-dark-bg), .app-body-light .glass .text-emerald-500:not(.force-dark-bg) { color: #059669 !important; } 
        .app-body-light .glass .text-cyan-400:not(.force-dark-bg), .app-body-light .glass .text-cyan-300:not(.force-dark-bg) { color: #0284c7 !important; } 
        .app-body-light .glass .text-red-400:not(.force-dark-bg), .app-body-light .glass .text-red-500:not(.force-dark-bg) { color: #dc2626 !important; } 
        .app-body-light .glass .text-amber-400:not(.force-dark-bg), .app-body-light .glass .text-amber-500:not(.force-dark-bg) { color: #d97706 !important; }
        .app-body-light .glass .text-indigo-400:not(.force-dark-bg), .app-body-light .glass .text-indigo-500:not(.force-dark-bg) { color: #4f46e5 !important; }
        
        .app-body-light .bg-black\/20, .app-body-light .bg-black\/30, .app-body-light .bg-black\/40 { background-color: #f1f5f9 !important; border-color: #cbd5e1 !important; }
        .app-body-light .bg-white\/5 { background-color: #ffffff !important; border-color: #e2e8f0 !important; }
        .app-body-light .hover\:bg-white\/5:hover { background-color: #f8fafc !important; }
        .app-body-light .bg-cyan-950\/20 { background-color: #f0f9ff !important; border-color: #bae6fd !important; }
        .app-body-light .bg-emerald-500\/10, .app-body-light .bg-emerald-950\/10 { background-color: #ecfdf5 !important; border-color: #a7f3d0 !important; }
        .app-body-light .bg-gold\/5, .app-body-light .bg-gold\/10 { background-color: #fffbeb !important; border-color: #fde68a !important; }
        .app-body-light .border-white\/5, .app-body-light .border-white\/10 { border-color: #e2e8f0 !important; }
        .app-body-light header { background-color: #ffffff !important; border-bottom-color: #e2e8f0 !important; }
        
        .kpi-card { background-color: #1e293b !important; border: 1px solid #334155 !important; }
        .kpi-card.kpi-emerald { background-color: #059669 !important; border-color: #047857 !important; }
        .app-body-light .kpi-card.active { background-color: #f8fafc !important; border-color: #94a3b8 !important; }
        
        .modern-input { width: 100%; padding: 14px 16px; border-radius: 12px; border: 1px solid rgba(148, 163, 184, 0.2); background: rgba(0,0,0,0.5); color: inherit; outline: none; transition: all 0.2s; font-size: 16px; }
        .app-body-light .modern-input { background: #fff !important; border: 1px solid #cbd5e1 !important; color: #0f172a !important; }

        .password-toggle { position: absolute; right: 12px; top: 50%; transform: translateY(-50%); z-index: 100; color: var(--gold); cursor: pointer; background: rgba(0,0,0,0.2); border-radius: 8px; padding: 6px; display: flex; align-items: center; justify-content: center; border: none; }
        .unit-pill { padding: 10px 20px; border-radius: 20px; font-size: 12px; font-weight: 800; border: 1px solid rgba(255,255,255,0.1); cursor: pointer; transition: 0.2s; color: #64748b; background: transparent; }
        .unit-pill.active { background: var(--gold) !important; color: #000 !important; border-color: var(--gold) !important; }
        .app-body-light .unit-pill { border-color: #cbd5e1; }
        .app-body-light .unit-pill.active { background: var(--gold) !important; color: #000 !important; border-color: var(--gold) !important; }
        
        .filter-pill { padding: 8px 18px; border-radius: 12px; font-size: 11px; font-weight: 800; border: 1px solid rgba(255,255,255,0.05); cursor: pointer; transition: 0.2s; color: #64748b; background: rgba(255,255,255,0.02); }
        .filter-pill.active { background: rgba(255,255,255,0.1); color: #fff; border-color: rgba(255,255,255,0.2); }
        .app-body-light .filter-pill { border-color: #cbd5e1; background: #fff; }
        .app-body-light .filter-pill.active { background: #0f172a; color: #fff; border-color: #0f172a; }

        .perm-box { display: flex; align-items: center; gap: 0.75rem; padding: 1rem; background: rgba(0,0,0,0.3); border: 1px solid rgba(255,255,255,0.05); border-radius: 1rem; cursor: pointer; transition: all 0.2s; }
        .app-body-light .perm-box { background: #f8fafc; border-color: #e2e8f0; }
        .perm-box:hover { background: rgba(0,0,0,0.5); border-color: rgba(251,191,36,0.3); }
        .app-body-light .perm-box:hover { background: #f1f5f9; border-color: #b45309; }
        .perm-checkbox { width: 1.25rem; height: 1.25rem; accent-color: var(--gold); cursor: pointer; }
        .perm-label { font-size: 11px; font-weight: 800; color: #cbd5e1; text-transform: uppercase; cursor: pointer; letter-spacing: 0.05em;}
        .app-body-light .perm-label { color: #475569; }

        .btn-premium-gold { background: linear-gradient(135deg, var(--gold) 0%, var(--gold-dark) 100%); color: #000; font-weight: 900; padding: 16px; border-radius: 14px; text-transform: uppercase; letter-spacing: 0.1em; border: none; width: 100%; cursor: pointer; transition: all 0.3s; text-align: center; font-size: 14px; }
        .btn-premium-gold:hover { transform: translateY(-1px); box-shadow: 0 4px 15px rgba(251, 191, 36, 0.4); }

        input[type="date"]::-webkit-calendar-picker-indicator { background: transparent; bottom: 0; color: transparent; cursor: pointer; height: auto; left: 0; position: absolute; right: 0; top: 0; width: auto; z-index: 20; }
        .date-container { position: relative; display: flex; align-items: center; width: 100%; }
        .calendar-icon-overlay { position: absolute; right: 14px; pointer-events: none; color: var(--gold); z-index: 10; }

        .progress-track { height: 20px; border-radius: 10px; background: rgba(255,255,255,0.05); overflow: hidden; border: 1px solid rgba(255,255,255,0.05); }
        .app-body-light .progress-track { background: #e2e8f0; border-color: #cbd5e1; }
        .progress-bar-fill { height: 100%; transition: width 1.2s cubic-bezier(0.4, 0, 0.2, 1); border-radius: 10px; }

        .glass { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .scrollbar-hide::-webkit-scrollbar { display: none; }
        .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.8); backdrop-filter: blur(6px); z-index: 1000; display: none; align-items: center; justify-content: center; padding: 1rem; overflow-y: auto;}
        .modal-overlay.active { display: flex; }
        .modal-content { background: #0f172a; border-radius: 24px; padding: 32px; max-width: 600px; width: 100%; border: 1px solid rgba(255,255,255,0.1); box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5); }
        .app-body-light .modal-content { background: #ffffff; color: #0f172a; border-color: #cbd5e1; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }
        .animate-fade-in { animation: fadeIn 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
        .project-card { transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); cursor: pointer; }
        .project-card:hover { transform: translateY(-4px); box-shadow: 0 20px 40px -10px rgba(0,0,0,0.5); border-color: rgba(251, 191, 36, 0.3); }

        /* Estilos de Impressão de Alta Performance (Sem Textos Invisíveis) */
        @media print { 
            @page { size: A4 landscape; margin: 8mm; }
            .no-print { display: none !important; } 
            
            body, .app-body-dark, .app-body-light, #main-app, main { 
                background: #ffffff !important; 
                color: #0f172a !important; 
                -webkit-print-color-adjust: exact !important; 
                print-color-adjust: exact !important; 
            }
            .glass { background: transparent !important; border: none !important; box-shadow: none !important; filter: none !important; backdrop-filter: none !important; }
            
            /* Converte caixas escuras para branco puro com borda */
            .bg-slate-900, .bg-slate-800, .bg-slate-700, .bg-black\/40, .bg-black\/20, .bg-black\/30, .bg-cyan-950\/20, .bg-emerald-950\/10 { 
                background: #ffffff !important; border: 1px solid #cbd5e1 !important; box-shadow: none !important; 
            }
            .bg-emerald-500\/10 { background: #ecfdf5 !important; border-color: #a7f3d0 !important; }
            .bg-gold\/5, .bg-amber-500\/10 { background: #fffbeb !important; border-color: #fde68a !important; }

            .kpi-card { background: #f8fafc !important; border: 1px solid #cbd5e1 !important; }
            .kpi-card[class*="bg-emerald"] { background: #ecfdf5 !important; border: 2px solid #059669 !important; }

            /* BLINDAGEM MÁXIMA PARA NÃO SUMIR VALORES: Força todas as fontes para tons escuros */
            h1, h2, h3, h4, h5, h6, p, span, div, th, td, a, li, ul, 
            .text-white, .force-white-text, .text-slate-100, .text-slate-200, .text-slate-300, .text-slate-400, .text-slate-500 { color: #0f172a !important; }
            
            /* Tons Vivos Escurecidos (Mantém contraste para leitura) */
            .text-gold, .text-amber-400, .text-amber-500 { color: #b45309 !important; font-weight: 800 !important; } 
            .text-emerald-400, .text-emerald-500 { color: #059669 !important; font-weight: 800 !important; }
            .text-red-400, .text-red-500 { color: #dc2626 !important; font-weight: 800 !important; }
            .text-cyan-400, .text-cyan-500 { color: #0891b2 !important; font-weight: 800 !important; }
            .text-indigo-400, .text-indigo-500 { color: #4338ca !important; font-weight: 800 !important; }
            
            canvas { max-width: 100% !important; max-height: 250px !important; page-break-inside: avoid; }
            
            /* Ajuste elástico e redução em tabelas longas (12 Meses) */
            .overflow-x-auto, .max-h-\[40vh\], .max-h-64, .max-h-96 { overflow: visible !important; max-height: none !important; width: 100% !important; } 
            table { width: 100% !important; border-collapse: collapse !important; table-layout: auto !important; }
            th, td { padding: 4px 6px !important; font-size: 8.5px !important; white-space: normal !important; word-wrap: break-word !important; border-bottom: 1px solid #e2e8f0 !important; }
            tr { page-break-inside: avoid !important; }
            
            #report-output .grid, #projects-grid { gap: 10px !important; }
            body.printing-kpi .hide-on-kpi-print { display: none !important; }
            body.printing-kpi .full-report-only { display: none !important; }
            
            .max-w-7xl, .max-w-4xl, .max-w-3xl, .max-w-2xl { max-width: 100% !important; margin: 0 !important; }
            ::-webkit-scrollbar { display: none !important; }
        }

        .flag-btn { border: 1px solid rgba(15,23,42,0.12); border-radius: 14px; padding: 10px; transition: .2s; background: #fff; }
        .flag-btn.active { border-color: var(--gold); box-shadow: 0 0 0 4px rgba(251,191,36,.12); }
        .tab-btn { color: rgba(148,163,184,0.9); font-size: 12px; }
        .tab-active { color: var(--gold); border-bottom: 2px solid var(--gold); }
        .app-body-light .tab-btn { color: #64748b; }
        .app-body-light .tab-active { color: var(--gold-dark); border-bottom-color: var(--gold-dark); }
        .status-badge { width: 12px; height: 12px; border-radius: 999px; display: inline-block; }
        .text-gold { color: var(--gold); }
        .role-tag { font-size: 9px; padding: 4px 8px; border-radius: 8px; font-weight: 800; text-transform: uppercase; letter-spacing: 0.1em; border: 1px solid currentColor; background: transparent;}
        .app-body-light .role-tag { background: white; }
    </style>
</head>
<body class="auth-body">

<div id="auth-screen" class="fixed inset-0 z-[2000] flex items-center justify-center p-6">
    <div class="auth-card">
        <div class="logo-box">
             <img src="logo-D2-Group-preto.png" alt="D2 Group" class="h-10 brightness-0 invert" onerror="this.onerror=null; this.src='https://via.placeholder.com/150x40?text=D2+Group'">
        </div>
        <h2 class="text-xs font-black tracking-[0.3em] mb-10 text-slate-400 uppercase" data-i18n="login_title">D2 Project Management Portal</h2>
        <form id="login-form" class="space-y-6 text-left mb-6">
            <div id="login-error-msg" class="hidden p-4 bg-red-50 border border-red-100 rounded-xl text-red-600 text-xs font-bold text-center uppercase tracking-widest leading-relaxed"></div>
            <div>
                <label class="label-auth" data-i18n="lbl_email">E-mail Corporativo</label>
                <input type="email" id="email" required class="auth-input" placeholder="usuario@allcablingtech.com">
            </div>
            <div class="relative">
                <label class="label-auth" data-i18n="lbl_pass">Senha de Acesso</label>
                <input type="password" id="password" required class="auth-input !pr-10" placeholder="••••••••">
                <button type="button" onclick="window.togglePassword('password', 'eye-login-btn')" class="password-toggle !text-slate-400" id="eye-login-btn" style="top: 70%;"><i data-lucide="eye" class="w-5 h-5"></i></button>
            </div>
            <button type="submit" id="btn-entrar" class="btn-access"><span data-i18n="btn_login">Acessar Sistema</span></button>
        </form>
        <div class="mt-8 flex justify-center gap-4">
            <button onclick="window.setLang('pt')" class="flag-btn active" id="l-pt"><img src="https://flagcdn.com/w80/br.png" class="w-6" onerror="this.style.display='none'"></button>
            <button onclick="window.setLang('en')" class="flag-btn" id="l-en"><img src="https://flagcdn.com/w80/us.png" class="w-6" onerror="this.style.display='none'"></button>
        </div>
    </div>
</div>

<div id="custom-modal" class="modal-overlay" style="z-index: 9999;">
    <div class="modal-content animate-fade-in max-w-sm w-full p-8 text-center !rounded-[32px]">
        <div id="custom-modal-icon" class="flex justify-center mb-5"></div>
        <h3 id="custom-modal-title" class="text-xl font-black text-white force-white-text mb-2">Atenção</h3>
        <div id="custom-modal-msg" class="text-sm text-slate-400 mb-8"></div>
        <div class="flex justify-center gap-3" id="custom-modal-buttons"></div>
    </div>
</div>

<div id="main-app" class="hidden min-h-screen flex flex-col app-body-dark text-center">
    <header id="main-header" class="no-print bg-white/5 backdrop-blur-md border-b border-white/5 p-4 sticky top-0 z-40 shadow-sm transition-all duration-300">
        <div class="max-w-7xl mx-auto flex justify-between items-center">
            <div class="flex items-center gap-6"><div class="bg-white p-2 rounded-xl shadow-md"><img id="header-logo" src="logo-D2-Group-preto.png" class="h-10" onerror="this.onerror=null; this.src='https://via.placeholder.com/150x40?text=D2+Group'"></div></div>
            <div class="flex items-center gap-5">
                <button onclick="window.toggleTheme()" class="p-3 rounded-2xl bg-white/5 hover:bg-gold/20 transition-all"><i data-lucide="sun" id="theme-icon-light" class="hidden text-gold"></i><i data-lucide="moon" id="theme-icon-dark" class="text-slate-400"></i></button>
                <div class="text-right hidden sm:block">
                    <p id="user-display" class="text-sm font-black uppercase text-gold tracking-tight"></p>
                    <p id="user-role-display" class="text-[10px] text-slate-500 font-bold uppercase tracking-widest" data-i18n="admin_panel">Gestão Corporativa</p>
                </div>
                <button onclick="window.handleLogout()" class="p-3 rounded-2xl text-red-500 hover:bg-red-500/10 transition-all border border-red-500/20 shadow-sm"><i data-lucide="log-out" class="w-5 h-5"></i></button>
            </div>
        </div>
    </header>

    <main id="main-container" class="max-w-7xl mx-auto w-full p-4 sm:p-6 flex-1 pt-6 sm:pt-8 transition-all duration-300">
        <nav id="main-nav" class="no-print flex gap-10 mb-6 border-b border-white/5 overflow-x-auto justify-center sm:justify-start scrollbar-hide">
            <button onclick="window.showView('projects')" class="tab-btn pb-4 font-black uppercase tracking-[0.2em] tab-active hidden" id="tab-projects" data-i18n="nav_proj">Projetos</button>
            <button onclick="window.cancelEdit(); window.showView('new')" class="tab-btn pb-4 font-black uppercase tracking-[0.2em] hidden" id="tab-new" data-i18n="nav_new">Nova Obra</button>
            <button onclick="window.showView('reports')" class="tab-btn pb-4 font-black uppercase tracking-[0.2em] hidden" id="tab-reports" data-i18n="nav_rep">Relatórios</button>
            <button onclick="window.showView('users')" class="tab-btn pb-4 font-black uppercase tracking-[0.2em] hidden text-gold" id="tab-users" data-i18n="nav_users">Equipe</button>
            <button onclick="window.showView('logs')" class="tab-btn pb-4 font-black uppercase tracking-[0.2em] hidden text-gold" id="tab-logs">📋 Logs</button>
        </nav>

        <div id="view-projects" class="w-full hidden">
            <div id="projects-filters" class="flex flex-col gap-6 mb-8 no-print">
                <div class="flex flex-col md:flex-row gap-4 w-full">
                    <div class="flex-1 text-left">
                        <label class="text-[10px] font-black uppercase text-slate-500 tracking-widest mb-1.5 block ml-1" data-i18n="quick_search">Busca Rápida</label>
                        <div class="relative"><i data-lucide="search" class="absolute left-4 top-1/2 -translate-y-1/2 w-4 h-4 text-slate-400"></i><input type="text" id="search-input" oninput="window.renderProjects()" class="modern-input !pl-10" placeholder="Buscar por cliente, projeto, invoice..." data-i18n-placeholder="search_placeholder"></div>
                    </div>
                    <div class="w-full md:w-64 text-left">
                        <label class="text-[10px] font-black uppercase text-slate-500 tracking-widest mb-1.5 block ml-1" data-i18n="filter_seller">Filtro por Vendedor</label>
                        <select id="filter-seller" onchange="window.renderProjects()" class="modern-input !pr-10"><option value="all" data-i18n="all_sellers">Todos os Vendedores</option></select>
                    </div>
                </div>
                <div class="flex flex-col sm:flex-row justify-between items-start sm:items-center gap-4">
                    <div class="flex gap-3 flex-wrap" id="dynamic-unit-pills-proj"></div>
                    <div class="flex gap-2 flex-wrap">
                        <button onclick="window.setArchiveFilter(false)" id="filter-active" class="filter-pill active" data-i18n="filter_active">ATIVAS</button>
                        <button onclick="window.setArchiveFilter(true)" id="filter-archived" class="filter-pill" data-i18n="filter_archived">ARQUIVADAS <i data-lucide="archive" class="inline w-3 h-3 ml-1 mb-0.5"></i></button>
                        <button onclick="window.setArchiveFilter('all')" id="filter-all-archived" class="filter-pill" data-i18n="filter_all">TODAS</button>
                    </div>
                </div>
            </div>
            <div id="projects-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8 text-left"></div>
        </div>

        <div id="view-new" class="hidden max-w-3xl mx-auto glass p-6 sm:p-10 rounded-[40px] text-left shadow-2xl border border-white/5 animate-fade-in">
            <h3 class="text-3xl font-black mb-10 flex items-center gap-4 uppercase tracking-tighter text-white">
                <span class="w-3 h-10 bg-gold rounded-full"></span><span id="form-title" data-i18n="form_new_title">Registrar Obra</span>
            </h3>
            <form id="project-form" class="grid grid-cols-1 md:grid-cols-2 gap-6 sm:gap-8 text-left">

    window.renderCharts = function(pId, budget, expensesByCategory, totalExpenses) {
        const ctxBudget = document.getElementById(`chart-budget-${pId}`);
        if (ctxBudget) {
            if (window.d2Charts[`budget-${pId}`]) window.d2Charts[`budget-${pId}`].destroy();
            const remaining = Math.max(0, budget - totalExpenses); 
            const overspent = Math.max(0, totalExpenses - budget);
            let dataArr, bgColors, labels;
            if (budget === 0 && totalExpenses === 0) { 
                labels = [window.t('budget')]; dataArr = [1]; bgColors = ['#334155']; 
            } else if (overspent > 0) { 
                labels = [window.t('budget'), 'Overbudget']; dataArr = [budget, overspent]; bgColors = ['#0891b2', '#dc2626']; 
            } else { 
                labels = [window.t('budget'), 'Restante']; dataArr = [totalExpenses, remaining]; bgColors = ['#0891b2', '#059669']; 
            }
            window.d2Charts[`budget-${pId}`] = new Chart(ctxBudget, { 
                type: 'doughnut', 
                data: { labels: labels, datasets: [{ data: dataArr, backgroundColor: bgColors, borderWidth: 0 }] }, 
                options: { responsive: true, maintainAspectRatio: false, cutout: '75%', plugins: { legend: { display: false } } } 
            });
        }
        const ctxCat = document.getElementById(`chart-cat-${pId}`);
        if (ctxCat) {
            if (window.d2Charts[`cat-${pId}`]) window.d2Charts[`cat-${pId}`].destroy();
            const labels = Object.keys(expensesByCategory); 
            const dataArr = Object.values(expensesByCategory);
            window.d2Charts[`cat-${pId}`] = new Chart(ctxCat, { 
                type: 'bar', 
                data: { labels: labels, datasets: [{ label: 'Gastos', data: dataArr, backgroundColor: '#0891b2', borderRadius: 4 }] }, 
                options: { 
                    responsive: true, 
                    maintainAspectRatio: false, 
                    plugins: { legend: { display: false } }, 
                    scales: { 
                        y: { beginAtZero: true, grid: { color: 'rgba(148,163,184,0.1)' }, ticks: { color: '#64748b', font: {size: 11} } }, 
                        x: { grid: { display: false }, ticks: { color: '#64748b', font: {size: 11} } } 
                    } 
                } 
            });
        }
    };

    window.getFin = function(p) {
        const percComissao = Number(p?.percComissao || 0) / 100; 
        const valorTotal = Number(p?.valorTotal || 0); 
        const orcamento = Number(p?.orcamento || 0);
        
        const globalMetodo = String(p?.metodo || ''); 
        const globalIsCC = (globalMetodo === 'CC' || globalMetodo.toLowerCase().includes('cartão'));
        const baseProjetada = globalIsCC ? valorTotal * 0.97 : valorTotal; 
        const commTotalProjetada = baseProjetada * percComissao;
        
        const recebimentos = Array.isArray(p?.recebimentos) ? p.recebimentos : [];
        let totalRecebido = 0; let commLiberada = 0;
        recebimentos.forEach(r => { 
            const rVal = Number(r.valor || 0); 
            totalRecebido += rVal; 
            const rBase = (r.metodo === 'CC') ? rVal * 0.97 : rVal; 
            commLiberada += rBase * percComissao; 
        });
        
        const pays = Array.isArray(p?.pagamentosEfetuados) ? p.pagamentosEfetuados : [];
        const totalPaid = pays.reduce((a, c) => a + Number(c?.valor || 0), 0); 
        const balance = commLiberada - totalPaid;
        
        let statusColor = "bg-red-500"; 
        if (balance < 0) statusColor = "bg-blue-500"; 
        else if (balance === 0 && commLiberada > 0) statusColor = "bg-emerald-500"; 
        else if (totalPaid > 0) statusColor = "bg-orange-500"; 
        
        const despesas = Array.isArray(p?.despesas) ? p.despesas : [];
        let totalDespesas = 0; 
        let gastosPorCategoria = { 'Materiais': 0, 'Mão-de-obra': 0, 'Equipamentos': 0, 'Licenças': 0, 'Comissões': 0, 'Outros': 0 };
        
        despesas.forEach(d => { 
            const val = Number(d.valor || 0); 
            totalDespesas += val; 
            if (gastosPorCategoria[d.categoria] !== undefined) { 
                gastosPorCategoria[d.categoria] += val; 
            } else { 
                gastosPorCategoria['Outros'] += val; 
            } 
        });
        
        pays.forEach(pay => { 
            const val = Number(pay?.valor || 0); 
            totalDespesas += val; 
            gastosPorCategoria['Comissões'] += val; 
        });

        const lucroBruto = valorTotal - totalDespesas;

    const renderReport = function() {
        const out = document.getElementById('report-output');
        if (!out || !state.user) return;

        const canViewAll = state.userPerms.global;
        const canViewCosts = state.userPerms.costs;

        const baseFiltered = state.projects.filter(p => {
            const matchCompany = (p.empresa === 'Smart Home' && state.userPerms.smart) || (p.empresa === 'HVAC' && state.userPerms.hvac);
            const matchSelectedTab = state.company === 'Ambas' || p.empresa === state.company;
            const matchUser = canViewAll || p.vendedor === state.user.email; 
            return matchCompany && matchSelectedTab && matchUser && !p.archived;
        });

        let tv = 0, tc = 0, tProfit = 0, totalCollected = 0; 
        let statusFunnel = {
            '✅ Aprovado': { id: 'status_aprovado', count: 0, val: 0, label: window.t('funnel_appr'), color: 'text-emerald-500', border: 'border-emerald-500/20', bg: 'bg-emerald-500/10', hoverRing: 'hover:ring-emerald-400', badgeBg: 'bg-emerald-500' },
            'Aguardando Início': { id: 'status_aguardando', count: 0, val: 0, label: window.t('funnel_wait'), color: 'text-amber-500', border: 'border-amber-500/20', bg: 'bg-amber-500/10', hoverRing: 'hover:ring-amber-400', badgeBg: 'bg-amber-500' },
            'Em Execução': { id: 'status_execucao', count: 0, val: 0, label: window.t('funnel_exec'), color: 'text-blue-500', border: 'border-blue-500/20', bg: 'bg-blue-500/10', hoverRing: 'hover:ring-blue-400', badgeBg: 'bg-blue-500' },
            'Finalizado': { id: 'status_finalizado', count: 0, val: 0, label: window.t('funnel_fin'), color: 'text-gold', border: 'border-gold/20', bg: 'bg-gold/10', hoverRing: 'hover:ring-gold', badgeBg: 'bg-amber-500' }
        };

        const currentYear = new Date().getFullYear();
        const monthNames = state.lang === 'en' ? ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'] : ['Jan','Fev','Mar','Abr','Mai','Jun','Jul','Ago','Sep','Out','Nov','Dez'];
        const sellerStats = {};

        const enrichedProjects = baseFiltered.map(p => {
            const f = window.getFin(p);
            tv += Number(p.valorTotal || 0); tc += Number(f.commLiberada || 0); totalCollected += f.totalRecebido;
            if (canViewCosts) tProfit += Number(f.lucroBruto || 0);

            if (p.status && statusFunnel[p.status] !== undefined) {
                statusFunnel[p.status].count++; statusFunnel[p.status].val += Number(p.valorTotal || 0);
            }

            const vend = p.vendedor || 'Sem Vendedor';
            if (!sellerStats[vend]) { sellerStats[vend] = { total: 0, months: Array(12).fill(0), projects: Array(12).fill(null).map(()=>[]) }; }

            const recebimentos = p.recebimentos || [];
            recebimentos.forEach(r => {
                if (r.data) {
                    const rYear = parseInt(r.data.split('-')[0], 10);
                    const rMonth = parseInt(r.data.split('-')[1], 10) - 1;
                    const rBase = r.metodo === 'CC' ? r.valor * 0.97 : r.valor;
                    const rComm = rBase * (p.percComissao / 100);
                    if (rYear === currentYear) { 
                        sellerStats[vend].months[rMonth] += rComm; 
                        sellerStats[vend].total += rComm; 
                        sellerStats[vend].projects[rMonth].push({ id: p.id, cliente: p.cliente, invoice: p.numeroInvoice, proposta: p.numeroProposta, val: rComm });
                    }
                }
            });
            return { p, f }; 
        });

        const reportTitle = state.company === 'Ambas' ? window.t('rep_title') : `${window.t('rep_title_company')} ${state.company}`;
        let ceoDashHTML = '';

        if (canViewCosts) {
            const totalOutstanding = tv - totalCollected; const avgMargin = tv > 0 ? (tProfit / tv) * 100 : 0;
            const kpiBlock = (id, label, val, linkTxt, ringCls, baseCls, labelColor) => {
                const isActive = state.reportActiveKpi === id; const color = isActive ? ringCls : baseCls;
                return `<div onclick="window.setReportKpi('${id}')" class="kpi-card cursor-pointer hover:-translate-y-1 hover:shadow-xl transition-all ${color} p-4 sm:p-5 rounded-2xl border border-transparent print:border-slate-300 print:bg-transparent shadow-lg print:shadow-none relative group flex flex-col justify-between h-full min-h-[110px]"><p class="text-[9px] sm:text-[10px] font-black uppercase ${labelColor} print:text-slate-600 mb-1 tracking-widest">${label}</p><p class="text-lg sm:text-xl font-black text-white print:text-slate-900 tracking-tighter break-words my-2">${val}</p>${linkTxt ? `<p class="text-[8px] uppercase font-bold tracking-widest mt-auto opacity-60 group-hover:opacity-100 no-print transition-colors ${labelColor}">${linkTxt}</p>`:''}</div>`;
            };

            let funnelHTML = Object.keys(statusFunnel).map(k => {
                const s = statusFunnel[k]; const isActive = state.reportActiveKpi === s.id;
                return `<div onclick="window.setReportKpi('${s.id}')" class="cursor-pointer hover:-translate-y-1 hover:shadow-md transition-all p-4 sm:p-5 rounded-2xl border ${s.border} ${s.bg} flex flex-col justify-between print:bg-transparent print:border-slate-300 shadow-sm group ${isActive ? `ring-2 ring-offset-2 ring-offset-slate-900 ${s.hoverRing.replace('hover:', '')}` : ''}"><div class="flex justify-between items-start mb-3"><p class="text-[9px] sm:text-[10px] font-black uppercase ${s.color} print:text-slate-600 tracking-widest leading-tight">${s.label}</p><span class="text-[10px] sm:text-xs font-black text-white print:text-slate-900 bg-slate-800 print:bg-slate-200 px-2 py-0.5 rounded-lg shadow-sm">${s.count}</span></div><p class="text-base sm:text-lg font-black text-slate-200 print:text-slate-900 tracking-tight break-words">${formatCurr(s.val)}</p></div>`;
            }).join('');

            ceoDashHTML = `
                <div class="mb-10 print:mb-8 animate-fade-in hide-on-kpi-print">

                    <div class="grid grid-cols-2 md:grid-cols-5 gap-3 sm:gap-4 mb-8">
                        ${kpiBlock('receita', window.t('gross_revenue'), formatCurr(tv), window.t('see_works'), 'bg-emerald-700 ring-2 ring-emerald-400', 'bg-emerald-600', 'text-emerald-100')}
                        ${kpiBlock('entradas', window.t('entries'), formatCurr(totalCollected), window.t('see_received'), 'bg-slate-700 ring-2 ring-emerald-500', 'bg-slate-800 border-l-4 border-l-emerald-500', 'text-emerald-400')}
                        ${kpiBlock('fluxo', window.t('to_receive'), formatCurr(totalOutstanding), window.t('see_pending'), 'bg-slate-700 ring-2 ring-amber-500', 'bg-slate-800 border-l-4 border-l-amber-500', 'text-amber-500')}
                        ${kpiBlock('lucro', window.t('est_profit'), formatCurr(tProfit), window.t('see_details'), 'bg-slate-700 ring-2 ring-cyan-500', 'bg-slate-800 border-l-4 border-l-cyan-500', 'text-cyan-400')}
                        ${kpiBlock('overview', window.t('global_margin'), `${avgMargin.toFixed(1)}%`, window.t('see_summary'), 'bg-slate-700 ring-2 ring-indigo-500', 'bg-slate-800 border-l-4 border-l-indigo-500', 'text-indigo-400')}
                    </div>
                    <h4 class="text-xs sm:text-sm font-black uppercase mb-4 text-slate-400 print:text-slate-800 tracking-widest border-b border-white/10 print:border-slate-300 pb-2">${window.t('active_funnel')}</h4>
                    <div class="grid grid-cols-2 md:grid-cols-4 gap-3 sm:gap-4 mb-4">${funnelHTML}</div>
                </div>`;
        }

        let bottomHTML = ''; 
        let kpiTitle = '';
        const tHead = (cols) => cols.map(c => `<th class="p-3 sm:p-4 print:text-slate-600 ${c.cls||''}">${c.lbl}</th>`).join('');
        const tCell = (val, cls="") => `<td class="p-3 sm:p-4 ${cls}">${val}</td>`;
        const tRow = (p, extras) => `<tr onclick="window.goToProject('${p.id}')" class="cursor-pointer border-b border-white/5 text-[10px] sm:text-xs text-left text-slate-300 print:text-slate-800 hover:bg-white/10 transition-colors print:border-slate-300"><td class="p-3 sm:p-4 font-bold text-slate-400 print:text-slate-600">${p.numeroProposta || '-'} / ${p.numeroInvoice || '-'}</td><td class="p-3 sm:p-4 font-black uppercase text-white print:text-slate-900"><div class="flex flex-col"><span>${p.cliente || ''}</span><span class="text-[8px] sm:text-[9px] font-bold text-slate-500 print:text-slate-500 mt-0.5">${tStatus(p.status)}</span></div></td>${extras}</tr>`;

        if (state.reportActiveKpi === 'overview') {
            let summaryRows = Object.keys(sellerStats).sort().map(vend => {
                const stats = sellerStats[vend];
                let monthsHtml = stats.months.map((mVal, mIdx) => {
                    if (mVal > 0) {
                        const encodedProj = encodeURIComponent(JSON.stringify(stats.projects[mIdx]));
                        return `<td class="p-2 sm:p-3 text-right text-amber-500 print:text-amber-700 font-bold cursor-pointer hover:bg-white/10 transition-colors" onclick="window.showMonthDetails('${vend}', ${mIdx}, '${encodedProj}')">${formatCurr(mVal)}</td>`;
                    } else { return `<td class="p-2 sm:p-3 text-right text-slate-500 print:text-slate-400">${formatCurr(mVal)}</td>`; }

                return `<tr class="border-b border-white/5 hover:bg-white/5 transition-colors print:border-slate-300"><td class="p-2 sm:p-3 font-black uppercase whitespace-nowrap text-slate-200 print:text-slate-800">${vend.split('@')[0]}</td>${monthsHtml}<td class="p-2 sm:p-3 text-right font-black text-emerald-400 print:text-emerald-700 bg-black/20 print:bg-slate-100">${formatCurr(stats.total)}</td></tr>`;
            }).join('');
            let summaryHeaderMonths = monthNames.map(m => `<th class="p-2 sm:p-3 text-right print:text-slate-600">${m}</th>`).join('');

            const buildGroupedTable = (dbCompanyName) => {

                const displayTitle = dbCompanyName === 'Smart Home' ? 'D2 Smart Home' : 'D2 HVAC Solutions';

                ];
                if(canViewCosts) {
                    cols.push({lbl: window.t('total_expenses'), cls: 'text-right bg-red-900/20 print:bg-transparent text-red-400 print:text-red-700'});
                    cols.push({lbl: window.t('real_profit'), cls: 'text-right bg-cyan-900/20 print:bg-transparent text-cyan-400 print:text-cyan-700'});
                    cols.push({lbl: window.t('margin'), cls: 'text-right bg-indigo-900/20 print:bg-transparent text-indigo-400 print:text-indigo-700'});

                const tableRows = coProjects.map(({p, f}) => {
                    let ext = tCell(p.vendedor?.split('@')[0] || '', 'font-bold text-slate-300 print:text-slate-800') + tCell(formatCurr(p.valorTotal), 'text-right print:text-slate-900') + tCell(formatCurr(f.totalRecebido), 'text-right font-black text-emerald-400 print:text-emerald-700') + tCell(formatCurr(f.commLiberada), 'text-right font-black text-amber-400 print:text-amber-700');

                    return tRow(p, ext);
                }).join('');
                return `<div class="mb-10"><h4 class="text-sm font-black text-slate-200 print:text-slate-800 bg-black/40 print:bg-transparent inline-block px-4 py-2 rounded-t-xl uppercase tracking-widest border border-b-0 border-white/5 print:border-slate-300">${displayTitle}</h4><div class="overflow-x-auto border border-white/5 print:border-slate-300 rounded-xl rounded-tl-none shadow-sm"><table class="w-full"><thead class="bg-black/20 print:bg-slate-100 border-b border-white/5 print:border-slate-300"><tr class="font-black uppercase text-[8px] sm:text-[9px] text-slate-400 print:text-slate-700 text-left tracking-widest">${tHead(cols)}</tr></thead><tbody>${tableRows}</tbody></table></div></div>`;
            };

            let detailedTablesHTML = '';
            if (state.company === 'Ambas') { detailedTablesHTML += buildGroupedTable('Smart Home') + buildGroupedTable('HVAC'); } 
            else { detailedTablesHTML += buildGroupedTable(state.company); }
            if(!detailedTablesHTML) detailedTablesHTML = `<p class="p-6 text-center text-slate-500 print:text-slate-600 text-xs italic">${window.t('no_active_works')}</p>`;

            bottomHTML = `<div class="full-report-only animate-fade-in mt-14"><div class="mb-14 print:mb-8"><div class="flex justify-between items-center mb-5 border-b-2 border-white/5 print:border-slate-300 pb-3"><h3 class="text-base sm:text-lg font-black uppercase tracking-tighter text-slate-200 print:text-slate-800 flex items-center gap-2"><i data-lucide="users" class="w-5 h-5 text-amber-500"></i> ${window.t('comm_paid_month')} (${currentYear})</h3></div><div class="overflow-x-auto border border-white/5 print:border-slate-300 rounded-2xl shadow-sm"><table class="w-full"><thead class="bg-black/20 print:bg-slate-100 border-b border-white/5 print:border-slate-300"><tr class="font-black uppercase text-[8px] sm:text-[9px] text-slate-400 print:text-slate-700 text-left tracking-widest"><th class="p-3 sm:p-4">${window.t('f_seller')}</th>${summaryHeaderMonths}<th class="p-3 sm:p-4 text-right bg-black/40 print:bg-slate-200 text-slate-300 print:text-slate-900">${window.t('total_year')}</th></tr></thead><tbody>${summaryRows || `<tr><td colspan="14" class="p-6 text-center text-slate-500 print:text-slate-600 text-xs italic">${window.t('no_data_year')}</td></tr>`}</tbody></table></div></div><div class="mb-8"><h3 class="text-base sm:text-lg font-black uppercase tracking-tighter mb-5 text-slate-200 print:text-slate-800 border-b-2 border-white/5 print:border-slate-300 pb-3 flex items-center gap-2"><i data-lucide="list-checks" class="w-5 h-5 text-emerald-500"></i> ${window.t('detailed_struct')}</h3>${detailedTablesHTML}</div></div>`;
        } else {
            let specificTableHTML = ''; let sRows = ''; 
            let cols = [];
            if (state.reportActiveKpi === 'receita') {
                kpiTitle = `Detalhamento: ${window.t('gross_revenue')}`;
                cols = [{lbl: window.t('prop_inv')}, {lbl: window.t('f_client')}, {lbl: window.t('f_seller')}, {lbl: window.t('f_gross'), cls: 'text-right'}];
                sRows = enrichedProjects.map(({p}) => tRow(p, tCell(p.vendedor?.split('@')[0] || '', 'font-bold text-slate-300 print:text-slate-800') + tCell(formatCurr(p.valorTotal), 'text-right font-black text-slate-100 print:text-slate-900 text-sm'))).join('');
            } else if (state.reportActiveKpi === 'entradas') {
                kpiTitle = `Detalhamento: ${window.t('entries')}`;
                cols = [{lbl: window.t('prop_inv')}, {lbl: window.t('f_client')}, {lbl: window.t('f_seller')}, {lbl: window.t('f_gross'), cls: 'text-right'}, {lbl: 'Total Recebido', cls: 'text-right'}];
                sRows = enrichedProjects.filter(({f}) => f.totalRecebido > 0).map(({p, f}) => tRow(p, tCell(p.vendedor?.split('@')[0] || '', 'font-bold text-slate-300 print:text-slate-800') + tCell(formatCurr(p.valorTotal), 'text-right text-slate-400 print:text-slate-900') + tCell(formatCurr(f.totalRecebido), 'text-right font-black text-emerald-400 print:text-emerald-700 text-sm'))).join('');
            } else if (state.reportActiveKpi === 'fluxo') {
                kpiTitle = `Detalhamento: ${window.t('to_receive')}`;
                cols = [{lbl: window.t('prop_inv')}, {lbl: window.t('f_client')}, {lbl: window.t('f_seller')}, {lbl: window.t('f_gross'), cls: 'text-right'}, {lbl: 'Recebido', cls: 'text-right'}, {lbl: window.t('missing_receive'), cls: 'text-right'}];
                sRows = enrichedProjects.filter(({p, f}) => (p.valorTotal - f.totalRecebido) > 0).map(({p, f}) => tRow(p, tCell(p.vendedor?.split('@')[0] || '', 'font-bold text-slate-300 print:text-slate-800') + tCell(formatCurr(p.valorTotal), 'text-right text-slate-400 print:text-slate-900') + tCell(formatCurr(f.totalRecebido), 'text-right text-emerald-400 print:text-emerald-700') + tCell(formatCurr(p.valorTotal - f.totalRecebido), 'text-right font-black text-amber-400 print:text-amber-700 text-sm'))).join('');
            } else if (state.reportActiveKpi === 'lucro') {
                kpiTitle = `Detalhamento: ${window.t('est_profit')} e ${window.t('margin')}`;
                cols = [{lbl: window.t('prop_inv')}, {lbl: window.t('f_client')}, {lbl: window.t('f_gross'), cls: 'text-right'}, {lbl: window.t('total_expenses'), cls: 'text-right'}, {lbl: window.t('real_profit'), cls: 'text-right'}, {lbl: window.t('margin')+' %', cls: 'text-right'}];
                sRows = enrichedProjects.map(({p, f}) => tRow(p, tCell(formatCurr(p.valorTotal), 'text-right text-slate-400 print:text-slate-900') + tCell(formatCurr(f.totalDespesas), 'text-right text-red-400 print:text-red-700') + tCell(formatCurr(f.lucroBruto), `text-right font-black ${f.lucroBruto >= 0 ? 'text-cyan-400 print:text-cyan-700' : 'text-red-500 print:text-red-700'} text-sm`) + tCell(`${f.margemLucro.toFixed(1)}%`, `text-right font-black ${f.margemLucro >= 0 ? 'text-indigo-400 print:text-indigo-700' : 'text-red-400 print:text-red-700'} text-sm`))).join('');
            } else if (state.reportActiveKpi.startsWith('status_')) {
                const targetStatusMap = { 'status_aprovado': '✅ Aprovado', 'status_aguardando': 'Aguardando Início', 'status_execucao': 'Em Execução', 'status_finalizado': 'Finalizado' };
                const targetStatus = targetStatusMap[state.reportActiveKpi];
                kpiTitle = `Funil: ${tStatus(targetStatus).replace('✅ ', '')}`;
                cols = [{lbl: window.t('prop_inv')}, {lbl: window.t('f_client')}, {lbl: window.t('f_seller')}, {lbl: window.t('f_gross'), cls: 'text-right'}];
                sRows = enrichedProjects.filter(({p}) => p.status === targetStatus).map(({p, f}) => tRow(p, tCell(p.vendedor?.split('@')[0] || '', 'font-bold text-slate-300 print:text-slate-800') + tCell(formatCurr(p.valorTotal), 'text-right font-black text-slate-100 print:text-slate-900 text-sm'))).join('');
            }
            specificTableHTML = `<table class="w-full"><thead class="bg-black/20 print:bg-slate-100 border-b border-white/5 print:border-slate-300"><tr class="font-black uppercase text-[8px] sm:text-[9px] text-slate-400 print:text-slate-700 text-left tracking-widest">${tHead(cols)}</tr></thead><tbody>${sRows || `<tr><td colspan="${cols.length}" class="p-6 text-center text-slate-500 print:text-slate-600 text-xs italic">${window.t('no_active_works')}</td></tr>`}</tbody></table>`;
            bottomHTML = `<div class="mt-8 mb-10 animate-fade-in"><div class="flex justify-between items-center mb-5 border-b-2 border-white/5 print:border-slate-300 pb-3"><h3 class="text-base sm:text-lg font-black uppercase tracking-tighter text-indigo-400 flex items-center gap-2"><i data-lucide="layout-list" class="w-5 h-5"></i> ${kpiTitle}</h3><button onclick="window.printKpiReport()" class="hidden sm:inline-flex items-center gap-2 text-slate-800 bg-white hover:bg-slate-200 transition-all font-black text-[10px] uppercase tracking-widest px-4 py-2 rounded-xl shadow-md no-print force-dark-bg"><i data-lucide="printer" class="w-3.5 h-3.5"></i> ${window.t('print_view')}</button></div><div class="overflow-x-auto border border-white/5 print:border-slate-300 rounded-2xl shadow-sm">${specificTableHTML}</div></div>`;
        }

        out.innerHTML = `
            <div class="glass p-6 sm:p-12 rounded-[50px] shadow-2xl border border-white/5 text-left animate-fade-in force-dark-bg print:bg-transparent print:border-none print:shadow-none">
                <div class="flex flex-col md:flex-row justify-between items-start md:items-center border-b-[8px] border-white/10 pb-8 mb-8 gap-4 print:border-b-2 print:border-slate-300">
                    <div class="flex flex-col sm:flex-row items-start sm:items-center gap-4 sm:gap-6">
                        <div class="logo-frame-sm p-3 rounded-2xl bg-white shadow-lg print:shadow-none print:border-none"><img src="logo-D2-Group-preto.png" class="h-10 sm:h-14" onerror="this.onerror=null; this.src='https://via.placeholder.com/150x40?text=D2+Group'"></div>
                        <div class="flex gap-2 sm:gap-3 no-print flex-wrap" id="report-unit-filters">
                            ${state.userPerms.smart ? `<button onclick="window.selectUnit('Smart Home')" class="unit-pill unit-pill-btn ${state.company === 'Smart Home' ? 'active':''} force-dark-bg">SMART HOME</button>` : ''}
                            ${state.userPerms.hvac ? `<button onclick="window.selectUnit('HVAC')" class="unit-pill unit-pill-btn ${state.company === 'HVAC' ? 'active':''} force-dark-bg">HVAC</button>` : ''}
                            ${(state.userPerms.smart && state.userPerms.hvac) ? `<button onclick="window.selectUnit('Ambas')" class="unit-pill unit-pill-btn ${state.company === 'Ambas' ? 'active':''} force-dark-bg" data-i18n="filter_both">${window.t('filter_both')}</button>` : ''}
                        </div>
                    </div>
                    <div class="text-left md:text-right w-full md:w-auto mt-4 md:mt-0">
                        <h2 class="text-2xl sm:text-3xl font-black uppercase tracking-tighter text-white print:text-slate-900 force-white-text">${reportTitle}</h2>
                        <p class="text-slate-400 print:text-slate-600 font-black uppercase text-xs tracking-widest mt-1">${window.t('date')}: ${new Date().toLocaleDateString(state.lang === 'pt' ? 'pt-BR' : 'en-US')}</p>
                    </div>
                </div>
                <div class="bg-black/20 p-6 sm:p-10 rounded-[40px] shadow-inner text-slate-200 border border-white/5 print:bg-transparent print:border-none print:p-0 print:shadow-none">
                    ${ceoDashHTML}
                    <div id="dynamic-report-content">${bottomHTML}</div>
                    ${state.reportActiveKpi === 'overview' ? `<div class="mt-12 pt-8 border-t-4 border-white/10 print:border-slate-300 flex justify-center no-print"><button onclick="window.printReport()" class="flex items-center gap-3 text-white force-white-text bg-slate-800 hover:bg-slate-700 transition-all font-black text-sm uppercase tracking-widest px-8 py-4 rounded-2xl shadow-xl hover:-translate-y-1"><i data-lucide="printer" class="w-5 h-5"></i> ${window.t('print_full_rep')}</button></div>` : ''}
                </div>
            </div>`;
        try { lucide.createIcons(); } catch {}
    }
    window.renderReport = renderReport;

    onAuthStateChanged(auth, (u) => {
        state.user = u; applyThemeConfig(); 
        if (u) {
            document.getElementById('auth-screen').classList.add('hidden'); document.getElementById('main-app').classList.remove('hidden');
            document.getElementById('user-display').innerText = u.email ? u.email.split('@')[0].toUpperCase() : "USR";
            state.isSuperAdmin = (u.email.toLowerCase() === SUPER_ADMIN.toLowerCase());
            initData(); logAccess(u.email, 'Fez login no sistema');
        } else {
            document.getElementById('auth-screen').classList.remove('hidden'); document.getElementById('main-app').classList.add('hidden'); document.body.className = 'auth-body';
        }
        window.setLang(state.lang); try { lucide.createIcons(); } catch {}
    });

    function initData() {
        if (!auth.currentUser) return;
        const projectsRef = collection(db, 'artifacts', appId, 'public', 'data', 'projects');
        onSnapshot(projectsRef, snap => {
            state.projects = snap.docs.map(d => ({ id: d.id, ...d.data() }));
            window.updateSellerFilterOptions(); window.renderProjects(); window.renderReport();
        }, err => console.error(err));

        onSnapshot(collection(db, 'artifacts', appId, 'public', 'data', 'user_credentials'), snap => {
            if (!auth.currentUser) return; 
            const team = snap.docs.map(d => ({ id: d.id, ...d.data() })); state.team = team;
            
            if (state.isSuperAdmin) {
                state.userPerms = { tab_proj: true, tab_new: true, tab_rep: true, fin: true, costs: true, smart: true, hvac: true, global: true };
            } else {
                const myProfile = team.find(u => u.email.toLowerCase() === auth.currentUser.email.toLowerCase());
                if (!myProfile) { window.showModal(window.t('modal_access_denied'), window.t('error'), 'error'); signOut(auth); return; }
                state.userPerms = { tab_proj: myProfile.p_tab_proj !== false, tab_new: myProfile.p_tab_new === true, tab_rep: myProfile.p_tab_rep === true, fin: myProfile.p_fin === true, costs: myProfile.p_costs === true || myProfile.viewCosts === true, smart: myProfile.p_smart !== false, hvac: myProfile.p_hvac !== false, global: myProfile.p_global === true || myProfile.viewAll === true };
            }
            
            window.applyPermissions(); window.renderVendedores(); window.updateSellerFilterOptions();

            const container = document.getElementById('users-list');
            if (container && state.isSuperAdmin) {
                container.innerHTML = team.map(u => {
                    let roleStr = "Editor", roleClass = "role-editor";
                    if(u.email.toLowerCase() === SUPER_ADMIN.toLowerCase()) { roleStr = "Super Admin"; roleClass = "role-admin"; }
                    else if(u.role === 'admin' || (u.p_global && u.p_costs)) { roleStr = "Admin"; roleClass = "role-admin"; }
                    else if(u.role === 'viewer' || (!u.p_tab_new && !u.p_fin && !u.p_costs)) { roleStr = "Viewer"; roleClass = "role-viewer"; }
                    
                    const p = { smart: u.p_smart !== false, hvac: u.p_hvac !== false, global: u.p_global === true || u.viewAll === true, tab_proj: u.p_tab_proj !== false, tab_new: u.p_tab_new === true, tab_rep: u.p_tab_rep === true, fin: u.p_fin === true, costs: u.p_costs === true || u.viewCosts === true };
                    const tagObj = encodeURIComponent(JSON.stringify(p));

                    let tagsHTML = '';
                    if(p.global) tagsHTML += `<span class="role-tag border-indigo-500 text-indigo-400 ml-1">GLOBAL</span>`;
                    if(p.smart) tagsHTML += `<span class="role-tag border-slate-500 text-slate-300 ml-1">SMART HOME</span>`;
                    if(p.hvac) tagsHTML += `<span class="role-tag border-slate-500 text-slate-300 ml-1">HVAC</span>`;
                    if(p.fin) tagsHTML += `<span class="role-tag border-emerald-500 text-emerald-400 ml-1">FINANÇAS</span>`;
                    if(p.costs) tagsHTML += `<span class="role-tag border-cyan-500 text-cyan-400 ml-1">CUSTOS</span>`;
                    
                    let tabsHTML = '';
                    if(p.tab_proj) tabsHTML += ' Projetos |'; if(p.tab_new) tabsHTML += ' Nova Obra |'; if(p.tab_rep) tabsHTML += ' Relatórios |';

                    return `<div class="glass p-6 rounded-[24px] flex justify-between items-center border-l-8 border-gold shadow-lg transition-all hover:scale-[1.01]"><div class="text-left"><p class="font-black text-slate-100 text-lg flex items-center gap-2 flex-wrap">${u.email} <span class="text-xs bg-black/30 px-2 py-1 rounded-full ${roleClass} border border-white/10">${roleStr}</span> ${tagsHTML}</p><p class="text-[10px] text-slate-400 mt-1 uppercase tracking-widest font-bold">Abas Liberadas: <span class="text-gold">${tabsHTML}</span></p><p class="text-[10px] text-slate-500 mt-1 uppercase tracking-widest">Senha: <span class="text-gold font-bold normal-case">${u.password}</span></p></div><div class="flex gap-2"><button onclick="window.editTeamMember('${u.id}', '${u.email}', '${u.password}', JSON.parse(decodeURIComponent('${tagObj}')))" class="p-2 text-gold hover:bg-gold/10 rounded-lg"><i data-lucide="edit" size="18"></i></button><button onclick="window.deleteTeam('${u.id}')" class="p-2 text-red-500 hover:bg-red-500/10 rounded-lg ${u.email.toLowerCase() === SUPER_ADMIN.toLowerCase() ? 'hidden' : ''}"><i data-lucide="user-minus" size="18"></i></button></div></div>`;
                }).join('');
                try { lucide.createIcons(); } catch {}
            }
        });
    }

    document.addEventListener('DOMContentLoaded', () => {
        try { lucide.createIcons(); } catch {}

        document.getElementById('login-form').onsubmit = async (e) => {
            e.preventDefault(); hideLoginMessages(); const btn = document.getElementById('btn-entrar'); btn.disabled = true;
            const email = document.getElementById('email').value.trim(); const pass = document.getElementById('password').value;
            try {
                await signInWithEmailAndPassword(auth, email, pass);
            } catch (err) {
                if (err?.code === 'auth/invalid-credential' || err?.code === 'auth/user-not-found' || err?.code === 'auth/wrong-password') {
                    try { await createUserWithEmailAndPassword(auth, email, pass); return; } 
                    catch (createErr) { if (createErr.code === 'auth/email-already-in-use') showLoginError(window.t('error')); else showLoginError(window.t('error')); }
                } else if (err?.code === 'auth/unauthorized-domain') { showLoginError('Domínio não autorizado.'); } 
                else { showLoginError('Falha no login: ' + err.message); }
            } finally { btn.disabled = false; }
        };

        document.getElementById('project-form').onsubmit = async (e) => {
            e.preventDefault(); if (!auth.currentUser) return;
            const id = document.getElementById('edit-id').value; const pStatus = document.getElementById('f-status').value;
            const d = {
                numeroProposta: document.getElementById('f-proposta').value || '', numeroInvoice: document.getElementById('f-invoice').value || '',
                empresa: document.getElementById('f-empresa').value, cliente: document.getElementById('f-cliente').value, vendedor: document.getElementById('f-vendedor').value,
                valorTotal: parseFloat(document.getElementById('f-valor').value), orcamento: parseFloat(document.getElementById('f-orcamento').value || 0), 
                metodo: document.getElementById('f-metodo').value, percComissao: parseInt(document.getElementById('f-comm').value),
                dataInicio: document.getElementById('f-inicio').value, dataEntrega: document.getElementById('f-entrega').value,
                status: pStatus, updatedAt: serverTimestamp()
            };
            if (pStatus === 'Finalizado') d.dataFinalizado = new Date().toISOString();

            try {
                if (id) { await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'projects', id), d); logAccess(state.user.email, `Editou a obra: ${d.cliente}`); } 
                else { await addDoc(collection(db, 'artifacts', appId, 'public', 'data', 'projects'), { ...d, archived: false, createdAt: serverTimestamp(), pagamentosEfetuados: [], recebimentos: [], despesas: [] }); logAccess(state.user.email, `Registrou nova obra: ${d.cliente}`); }
                e.target.reset(); document.getElementById('edit-id').value = ''; document.getElementById('f-vendedor').value = auth.currentUser.email; window.showView('projects');
            } catch (err) { console.error(err); }
        };

        document.getElementById('team-form').onsubmit = async (e) => {
            e.preventDefault(); if (!auth.currentUser || !state.isSuperAdmin) return;
            const id = document.getElementById('t-id').value; const mail = document.getElementById('t-email').value.trim(); const pass = document.getElementById('t-pass').value; 
            const permData = {
                email: mail, password: pass, updatedAt: serverTimestamp(),
                p_smart: document.getElementById('p_smart').checked, p_hvac: document.getElementById('p_hvac').checked, p_global: document.getElementById('p_global').checked,
                p_tab_proj: document.getElementById('p_tab_proj').checked, p_tab_new: document.getElementById('p_tab_new').checked, p_tab_rep: document.getElementById('p_tab_rep').checked,
                p_fin: document.getElementById('p_fin').checked, p_costs: document.getElementById('p_costs').checked
            };

            try {
                try { const secApp = initializeApp(firebaseConfig, "SecApp_" + Date.now()); const secAuth = getAuth(secApp); await createUserWithEmailAndPassword(secAuth, mail, pass); await signOut(secAuth); await deleteApp(secApp); } catch (authErr) {}
                if (!id) { await addDoc(collection(db, 'artifacts', appId, 'public', 'data', 'user_credentials'), permData); logAccess(state.user.email, `Adicionou usuário: ${mail}`); } 
                else { await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'user_credentials', id), permData); logAccess(state.user.email, `Atualizou usuário: ${mail}`); }
                e.target.reset(); document.getElementById('t-id').value = ''; 
                document.querySelectorAll('.perm-checkbox').forEach(c => c.checked = false);
                document.getElementById('p_smart').checked = true; document.getElementById('p_hvac').checked = true; document.getElementById('p_tab_proj').checked = true;
            } catch (err) { window.showModal(window.t('error'), 'Erro ao salvar usuário: ' + err.message, 'error'); }
        };
    });
</script>
</body>
</html>
