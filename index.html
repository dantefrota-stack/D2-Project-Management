<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>D2 Project Management - Premium Official</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <!-- Chart.js para Gráficos Interativos -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root { --gold: #fbbf24; --gold-dark: #b45309; --d2-blue: #0f172a; }
        body { font-family: 'Inter', sans-serif; transition: background-color 0.3s, color 0.3s; margin: 0; }

        /* Design Login - Enterprise Portal Pattern */
        .auth-body { background-color: #f1f5f9; color: #0f172a; display: flex; align-items: center; justify-content: center; min-height: 100vh; }
        .auth-card { background: white; border-radius: 40px; width: 100%; max-width: 440px; padding: 48px; box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.1); text-align: center; }
        .logo-box { background: var(--d2-blue); border-radius: 20px; padding: 20px; display: inline-block; margin-bottom: 24px; }
        .label-auth { font-size: 12px; font-weight: 800; color: #64748b; text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 6px; display: block; text-align: left; }
        .auth-input { width: 100%; padding: 16px 20px; border-radius: 12px; background: #f8fafc; border: 1px solid #e2e8f0; color: #0f172a; outline: none; transition: all 0.2s; font-size: 16px; }
        .auth-input:focus { border-color: var(--gold); box-shadow: 0 0 0 4px rgba(251, 191, 36, 0.1); }
        .btn-access { width: 100%; background: var(--d2-blue); color: white; padding: 18px; border-radius: 14px; font-weight: 800; text-transform: uppercase; letter-spacing: 0.1em; transition: all 0.3s; margin-top: 10px; border: none; cursor: pointer; font-size: 14px; }
        .btn-access:hover { transform: translateY(-2px); box-shadow: 0 10px 20px rgba(15, 23, 42, 0.2); }

        /* Interface Interna Escura (Padrão) */
        .app-body-dark { background-color: #030508; color: #f1f5f9; }
        
        /* Interface Interna Clara (Light Mode) */
        .app-body-light { background-color: #f8fafc; color: #0f172a; }
        .app-body-light .glass { background: #ffffff !important; border-color: #e2e8f0 !important; color: #0f172a; box-shadow: 0 10px 30px -10px rgba(0,0,0,0.1) !important;}
        
        /* --- PROTEÇÃO INTELIGENTE DE CONTRASTE --- */
        .app-body-light .text-white:not(button *):not(button):not(.status-badge):not(.force-white-text):not(.force-dark-bg):not(.force-dark-bg *) { color: #0f172a !important; }
        .force-white-text { color: #ffffff !important; }
        
        /* Conversões de texto para o Light Mode */
        .app-body-light .text-slate-200:not(.force-dark-bg):not(.force-dark-bg *), 
        .app-body-light .text-slate-300:not(.force-dark-bg):not(.force-dark-bg *) { color: #334155 !important; }
        .app-body-light .text-slate-400:not(.force-dark-bg):not(.force-dark-bg *) { color: #475569 !important; }
        .app-body-light .text-slate-500:not(.force-dark-bg):not(.force-dark-bg *) { color: #64748b !important; }
        .app-body-light .text-gold:not(.force-dark-bg):not(.force-dark-bg *) { color: #b45309 !important; } 
        .app-body-light .text-emerald-400:not(.force-dark-bg):not(.force-dark-bg *), 
        .app-body-light .text-emerald-500:not(.force-dark-bg):not(.force-dark-bg *) { color: #059669 !important; } 
        .app-body-light .text-cyan-400:not(.force-dark-bg):not(.force-dark-bg *), 
        .app-body-light .text-cyan-300:not(.force-dark-bg):not(.force-dark-bg *) { color: #0284c7 !important; } 
        .app-body-light .text-red-400:not(.force-dark-bg):not(.force-dark-bg *), 
        .app-body-light .text-red-500:not(.force-dark-bg):not(.force-dark-bg *) { color: #dc2626 !important; } 
        .app-body-light .text-amber-400:not(.force-dark-bg):not(.force-dark-bg *), 
        .app-body-light .text-amber-500:not(.force-dark-bg):not(.force-dark-bg *) { color: #d97706 !important; }
        .app-body-light .text-indigo-400:not(.force-dark-bg):not(.force-dark-bg *), 
        .app-body-light .text-indigo-500:not(.force-dark-bg):not(.force-dark-bg *) { color: #4f46e5 !important; }
        .app-body-light .text-lime-500, .app-body-light .text-lime-400 { color: #4d7c0f !important; } 
        .app-body-light .text-lime-600\/70 { color: rgba(77, 124, 15, 0.8) !important; } 
        
        /* Ajustes Estruturais Light Mode - Fundo dos Cards e Relatórios */
        .app-body-light .bg-black\/20, .app-body-light .bg-black\/30, .app-body-light .bg-black\/40 { background-color: #f1f5f9 !important; border-color: #cbd5e1 !important; }
        .app-body-light .bg-white\/5 { background-color: #ffffff !important; border-color: #e2e8f0 !important; }
        .app-body-light .hover\:bg-white\/5:hover { background-color: #f8fafc !important; }
        .app-body-light .bg-cyan-950\/20 { background-color: #f0f9ff !important; border-color: #bae6fd !important; }
        .app-body-light .bg-emerald-500\/10 { background-color: #ecfdf5 !important; border-color: #a7f3d0 !important; }
        .app-body-light .bg-gold\/10 { background-color: #fffbeb !important; border-color: #fde68a !important; }
        .app-body-light .border-white\/5, .app-body-light .border-white\/10 { border-color: #e2e8f0 !important; }
        .app-body-light header { background-color: #ffffff !important; border-bottom-color: #e2e8f0 !important; }
        
        .app-body-light .kpi-card { background-color: #ffffff !important; border-color: #cbd5e1 !important; box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1) !important; }
        .app-body-light .kpi-card.active { background-color: #f8fafc !important; border-color: #94a3b8 !important; }
        
        .modern-input { width: 100%; padding: 14px 16px; border-radius: 12px; border: 1px solid rgba(148, 163, 184, 0.2); background: rgba(0,0,0,0.5); color: inherit; outline: none; transition: all 0.2s; font-size: 16px; }
        .app-body-light .modern-input { background: #fff !important; border: 1px solid #cbd5e1 !important; color: #0f172a !important; }

        .password-toggle { position: absolute; right: 12px; top: 50%; transform: translateY(-50%); z-index: 100; color: var(--gold); cursor: pointer; background: rgba(0,0,0,0.2); border-radius: 8px; padding: 6px; display: flex; align-items: center; justify-content: center; border: none; }
        .password-toggle svg { width: 18px; height: 18px; stroke-width: 2.5; }

        .unit-pill { padding: 10px 20px; border-radius: 20px; font-size: 12px; font-weight: 800; border: 1px solid rgba(255,255,255,0.1); cursor: pointer; transition: 0.2s; color: #64748b; background: transparent; }
        .unit-pill.active { background: var(--gold); color: #000; border-color: var(--gold); }
        .app-body-light .unit-pill { border-color: #cbd5e1; }
        
        .filter-pill { padding: 8px 18px; border-radius: 12px; font-size: 11px; font-weight: 800; border: 1px solid rgba(255,255,255,0.05); cursor: pointer; transition: 0.2s; color: #64748b; background: rgba(255,255,255,0.02); }
        .filter-pill.active { background: rgba(255,255,255,0.1); color: #fff; border-color: rgba(255,255,255,0.2); }
        .app-body-light .filter-pill { border-color: #cbd5e1; background: #fff; }
        .app-body-light .filter-pill.active { background: #0f172a; color: #fff; border-color: #0f172a; }

        .btn-premium-gold { background: linear-gradient(135deg, var(--gold) 0%, var(--gold-dark) 100%); color: #000; font-weight: 900; padding: 16px; border-radius: 14px; text-transform: uppercase; letter-spacing: 0.1em; border: none; width: 100%; cursor: pointer; transition: all 0.3s; text-align: center; font-size: 14px; }
        .btn-premium-gold:hover { transform: translateY(-1px); box-shadow: 0 4px 15px rgba(251, 191, 36, 0.4); }

        input[type="date"] { position: relative; } 
        input[type="date"]::-webkit-calendar-picker-indicator { background: transparent; bottom: 0; color: transparent; cursor: pointer; height: auto; left: 0; position: absolute; right: 0; top: 0; width: auto; z-index: 20; }
        .date-container { position: relative; display: flex; align-items: center; width: 100%; }
        .calendar-icon-overlay { position: absolute; right: 14px; pointer-events: none; color: var(--gold); z-index: 10; }

        .progress-track { height: 20px; border-radius: 10px; background: rgba(255,255,255,0.05); overflow: hidden; border: 1px solid rgba(255,255,255,0.05); }
        .app-body-light .progress-track { background: #e2e8f0; border-color: #cbd5e1; }
        .progress-bar-fill { height: 100%; transition: width 1.2s cubic-bezier(0.4, 0, 0.2, 1); border-radius: 10px; }

        .glass { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .scrollbar-hide::-webkit-scrollbar { display: none; }
        
        .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.8); backdrop-filter: blur(6px); z-index: 1000; display: none; align-items: center; justify-content: center; padding: 1rem; }
        .modal-overlay.active { display: flex; }
        .modal-content { background: #0f172a; border-radius: 24px; padding: 32px; max-width: 600px; width: 100%; max-height: 80vh; overflow-y: auto; border: 1px solid rgba(255,255,255,0.1); box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5); }
        .app-body-light .modal-content { background: #ffffff; color: #0f172a; border-color: #cbd5e1; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }
        .animate-fade-in { animation: fadeIn 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
        
        /* Interação Global do Card */
        .project-card { transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); cursor: pointer; }
        .project-card:hover { transform: translateY(-4px); box-shadow: 0 20px 40px -10px rgba(0,0,0,0.5); border-color: rgba(251, 191, 36, 0.3); }

        /* Estilos de Impressão (PDF & Papel) OTIMIZADOS */
        @media print { 
            @page { size: letter; margin: 10mm; }
            .no-print { display: none !important; } 
            body, .app-body-dark, .app-body-light { background: #fff !important; color: #0f172a !important; -webkit-print-color-adjust: exact; print-color-adjust: exact; }
            .glass { background: #fff !important; border: 1px solid #cbd5e1 !important; box-shadow: none !important; filter: none !important; backdrop-filter: none !important; page-break-inside: avoid; }
            .text-white, .text-slate-200, .text-slate-300, .text-slate-400, .force-white-text { color: #0f172a !important; }
            .text-gold { color: #b45309 !important; font-weight: 900 !important; } 
            .bg-slate-900, .bg-slate-800, .bg-black\/40 { background: #f8fafc !important; border-color: #cbd5e1 !important; color: #0f172a !important; }
            .bg-emerald-600 { background: #059669 !important; color: #ffffff !important; }
            .bg-emerald-600 .text-white { color: #ffffff !important; }
            
            canvas { max-width: 100% !important; max-height: 250px !important; page-break-inside: avoid; }
            .overflow-x-auto { overflow: visible !important; } 
            tr { page-break-inside: avoid !important; }
            #report-output .grid { display: grid !important; }
            
            /* Impressão Direcionada Inteligente (Oculta cards se for imprimir visão) */
            body.printing-kpi .hide-on-kpi-print { display: none !important; }
            body.printing-kpi .full-report-only { display: none !important; }
            
            /* Força a cor branca nos badges do funil durante a impressão para ficarem legíveis */
            .print-force-white { color: #ffffff !important; }
        }

        .flag-btn { border: 1px solid rgba(15,23,42,0.12); border-radius: 14px; padding: 10px; transition: .2s; background: #fff; }
        .flag-btn.active { border-color: var(--gold); box-shadow: 0 0 0 4px rgba(251,191,36,.12); }
        .tab-btn { color: rgba(148,163,184,0.9); font-size: 12px; }
        .tab-active { color: var(--gold); border-bottom: 2px solid var(--gold); }
        .app-body-light .tab-btn { color: #64748b; }
        .app-body-light .tab-active { color: var(--gold-dark); border-bottom-color: var(--gold-dark); }
        .status-badge { width: 12px; height: 12px; border-radius: 999px; display: inline-block; }
        .text-gold { color: var(--gold); }
        .role-tag { font-size: 10px; padding: 3px 8px; border-radius: 6px; font-weight: 800; text-transform: uppercase; letter-spacing: 0.1em; }
        .role-admin { background: rgba(251,191,36,0.2); color: var(--gold); }
        .role-editor { background: rgba(56,189,248,0.2); color: #38bdf8; }
        .role-viewer { background: rgba(148,163,184,0.2); color: #94a3b8; }
    </style>
</head>
<body class="auth-body">

<!-- Login Screen -->
<div id="auth-screen" class="fixed inset-0 z-[2000] flex items-center justify-center p-6">
    <div class="auth-card">
        <div class="logo-box">
             <img src="logo-D2-Group-preto.png" alt="D2 Group" class="h-10 brightness-0 invert">
        </div>
        <h2 class="text-xs font-black tracking-[0.3em] mb-10 text-slate-400 uppercase" data-i18n="login_title">D2 Project Management Portal</h2>

        <form id="login-form" class="space-y-6 text-left mb-6">
            <div id="login-error-msg" class="hidden p-4 bg-red-50 border border-red-100 rounded-xl text-red-600 text-xs font-bold text-center uppercase tracking-widest leading-relaxed"></div>
            <div id="login-hint-msg" class="hidden p-4 bg-amber-50 border border-amber-100 rounded-xl text-amber-700 text-xs font-bold text-center uppercase tracking-widest leading-relaxed"></div>

            <div>
                <label class="label-auth" data-i18n="lbl_email">E-mail Corporativo</label>
                <input type="email" id="email" required class="auth-input" placeholder="usuario@allcablingtech.com">
            </div>

            <div class="relative">
                <label class="label-auth" data-i18n="lbl_pass">Senha de Acesso</label>
                <input type="password" id="password" required class="auth-input !pr-10" placeholder="••••••••">
                <button type="button" onclick="window.togglePassword('password', 'eye-login-btn')" class="password-toggle !text-slate-400" id="eye-login-btn" style="top: 70%;">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
                </button>
            </div>

            <button type="submit" id="btn-entrar" class="btn-access">
                <span data-i18n="btn_login">Acessar Sistema</span>
            </button>
        </form>

        <div class="mt-8 flex justify-center gap-4">
            <button onclick="window.setLang('pt')" class="flag-btn active" id="l-pt"><img src="https://flagcdn.com/w80/br.png" class="w-6"></button>
            <button onclick="window.setLang('en')" class="flag-btn" id="l-en"><img src="https://flagcdn.com/w80/us.png" class="w-6"></button>
        </div>
    </div>
</div>

<!-- Modal Global de Alertas e Confirmações do Sistema -->
<div id="custom-modal" class="modal-overlay" style="z-index: 9999;">
    <div class="modal-content animate-fade-in max-w-sm w-full p-8 text-center !rounded-[32px]">
        <div id="custom-modal-icon" class="flex justify-center mb-5"></div>
        <h3 id="custom-modal-title" class="text-xl font-black text-white force-white-text mb-2">Atenção</h3>
        <p id="custom-modal-msg" class="text-sm text-slate-400 mb-8"></p>
        <div class="flex justify-center gap-3" id="custom-modal-buttons"></div>
    </div>
</div>

<!-- Modal de Edição de Recebimentos -->
<div id="edit-rec-modal" class="modal-overlay">
    <div class="modal-content animate-fade-in">
        <h3 class="text-2xl font-black text-emerald-500 mb-6" data-i18n="client_receipts">Editar Recebimentos (Cliente)</h3>
        <div id="rec-edit-list" class="space-y-4 mb-6"></div>
        <div class="flex justify-end gap-4">
            <button onclick="window.closeEditRecModal()" class="px-6 py-3 bg-slate-700 text-white rounded-xl font-bold hover:bg-slate-600 transition-colors" data-i18n="cancel">Cancelar</button>
            <button onclick="window.saveEditedRecs()" class="px-8 py-3 bg-emerald-600 text-white font-black rounded-xl hover:bg-emerald-500 transition-colors shadow-lg" data-i18n="btn_save">Salvar Alterações</button>
        </div>
    </div>
</div>

<!-- Modal de Edição de Pagamentos -->
<div id="edit-payment-modal" class="modal-overlay">
    <div class="modal-content animate-fade-in">
        <h3 class="text-2xl font-black text-gold mb-6" data-i18n="seller_payments">Editar Pagamentos (Vendedor)</h3>
        <div id="payment-edit-list" class="space-y-4 mb-6"></div>
        <div class="flex justify-end gap-4">
            <button onclick="window.closeEditPaymentModal()" class="px-6 py-3 bg-slate-700 text-white rounded-xl font-bold hover:bg-slate-600 transition-colors" data-i18n="cancel">Cancelar</button>
            <button onclick="window.saveEditedPayments()" class="px-8 py-3 bg-slate-800 text-white border border-gold/30 font-black rounded-xl hover:bg-slate-700 transition-colors shadow-lg" data-i18n="btn_save">Salvar Alterações</button>
        </div>
    </div>
</div>

<!-- Interface Interna -->
<div id="main-app" class="hidden min-h-screen flex flex-col app-body-dark text-center">
    
    <!-- HEADER PRINCIPAL -->
    <header id="main-header" class="no-print bg-white/5 backdrop-blur-md border-b border-white/5 p-4 sticky top-0 z-40 shadow-sm transition-all duration-300">
        <div class="max-w-7xl mx-auto flex justify-between items-center">
            <div class="flex items-center gap-6">
                <div class="bg-white p-2 rounded-xl shadow-md"><img id="header-logo" src="logo-D2-Group-preto.png" class="h-10"></div>
            </div>

            <div class="flex items-center gap-5">
                <button onclick="window.toggleTheme()" class="p-3 rounded-2xl bg-white/5 hover:bg-gold/20 transition-all"><i data-lucide="sun" id="theme-icon-light" class="hidden text-gold"></i><i data-lucide="moon" id="theme-icon-dark" class="text-slate-400"></i></button>
                <div class="text-right hidden sm:block">
                    <p id="user-display" class="text-sm font-black uppercase text-gold tracking-tight"></p>
                    <p id="user-role-display" class="text-[10px] text-slate-500 font-bold uppercase tracking-widest" data-i18n="admin_panel">Gestão Corporativa</p>
                </div>
                <button onclick="window.handleLogout()" class="p-3 rounded-2xl text-red-500 hover:bg-red-500/10 transition-all border border-red-500/20 shadow-sm"><i data-lucide="log-out" class="w-5 h-5"></i></button>
            </div>
        </div>
    </header>

    <main id="main-container" class="max-w-7xl mx-auto w-full p-4 sm:p-6 flex-1 pt-6 sm:pt-8 transition-all duration-300">
        
        <!-- NAVEGAÇÃO PRINCIPAL -->
        <nav id="main-nav" class="no-print flex gap-10 mb-6 border-b border-white/5 overflow-x-auto justify-center sm:justify-start scrollbar-hide">
            <button onclick="window.showView('projects')" class="tab-btn pb-4 font-black uppercase tracking-[0.2em] tab-active" id="tab-projects" data-i18n="nav_proj">Projetos</button>
            <button onclick="window.cancelEdit(); window.showView('new')" class="tab-btn pb-4 font-black uppercase tracking-[0.2em] editor-only hidden" id="tab-new" data-i18n="nav_new">Nova Obra</button>
            <button onclick="window.showView('reports')" class="tab-btn pb-4 font-black uppercase tracking-[0.2em]" id="tab-reports" data-i18n="nav_rep">Relatórios</button>
            <button onclick="window.showView('users')" class="tab-btn pb-4 font-black uppercase tracking-[0.2em] admin-only hidden" id="tab-users" data-i18n="nav_users">Equipe</button>
            <button onclick="window.showView('logs')" class="tab-btn pb-4 font-black uppercase tracking-[0.2em] admin-only hidden" id="tab-logs">📋 Logs</button>
        </nav>

        <div id="view-projects" class="w-full">
            <!-- Filtros Superiores do Painel de Projetos -->
            <div id="projects-filters" class="flex flex-col sm:flex-row justify-between items-center mb-8 gap-4 no-print">
                <div class="flex gap-3">
                    <button onclick="window.selectUnit('Smart Home')" class="unit-pill unit-pill-btn">SMART HOME</button>
                    <button onclick="window.selectUnit('HVAC')" class="unit-pill unit-pill-btn">HVAC</button>
                    <button onclick="window.selectUnit('Ambas')" class="unit-pill unit-pill-btn active" data-i18n="filter_both">AMBAS</button>
                </div>
                <div class="flex gap-2">
                    <button onclick="window.setArchiveFilter(false)" id="filter-active" class="filter-pill active" data-i18n="filter_active">ATIVAS</button>
                    <button onclick="window.setArchiveFilter(true)" id="filter-archived" class="filter-pill" data-i18n="filter_archived">ARQUIVADAS <i data-lucide="archive" class="inline w-3 h-3 ml-1 mb-0.5"></i></button>
                </div>
            </div>
            
            <div id="projects-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8 text-left"></div>
        </div>

        <!-- Formulário Nova Obra -->
        <div id="view-new" class="hidden max-w-3xl mx-auto glass p-6 sm:p-10 rounded-[40px] text-left shadow-2xl border border-white/5 animate-fade-in">
            <h3 class="text-3xl font-black mb-10 flex items-center gap-4 uppercase tracking-tighter text-white">
                <span class="w-3 h-10 bg-gold rounded-full"></span>
                <span id="form-title" data-i18n="form_new_title">Registrar Obra</span>
            </h3>
            <form id="project-form" class="grid grid-cols-1 md:grid-cols-2 gap-6 sm:gap-8 text-left">
                <input type="hidden" id="edit-id">

                <div class="col-span-2 md:col-span-1 space-y-2">
                    <label class="text-xs font-black uppercase text-slate-500 ml-1 tracking-widest" data-i18n="f_prop">Nº Proposta</label>
                    <input type="text" id="f-proposta" class="modern-input" placeholder="Ex: PROP-2026-001">
                </div>
                <div class="col-span-2 md:col-span-1 space-y-2">
                    <label class="text-xs font-black uppercase text-slate-500 ml-1 tracking-widest" data-i18n="f_inv">Nº Invoice</label>
                    <input type="text" id="f-invoice" class="modern-input" placeholder="Ex: INV-2026-001">
                </div>

                <div class="col-span-2 space-y-2">
                    <label class="text-xs font-black uppercase text-slate-500 ml-1 tracking-widest" data-i18n="f_unit">Unidade Responsável</label>

    function renderCharts(pId, budget, expensesByCategory, totalExpenses) {
        const ctxBudget = document.getElementById(`chart-budget-${pId}`);
        if (ctxBudget) {
            if (window.d2Charts[`budget-${pId}`]) window.d2Charts[`budget-${pId}`].destroy();
            const remaining = Math.max(0, budget - totalExpenses); const overspent = Math.max(0, totalExpenses - budget);
            let dataArr, bgColors, labels;
            
            if (budget === 0 && totalExpenses === 0) {
                labels = [window.t('budget')]; dataArr = [1]; bgColors = ['#334155'];
            } else if (overspent > 0) {
                labels = [window.t('budget'), 'Overbudget']; dataArr = [budget, overspent]; bgColors = ['#0891b2', '#dc2626'];
            } else {
                labels = [window.t('budget'), 'Restante']; dataArr = [totalExpenses, remaining]; bgColors = ['#0891b2', '#059669'];
            }

            window.d2Charts[`budget-${pId}`] = new Chart(ctxBudget, {
                type: 'doughnut', data: { labels: labels, datasets: [{ data: dataArr, backgroundColor: bgColors, borderWidth: 0 }] },
                options: { responsive: true, maintainAspectRatio: false, cutout: '75%', plugins: { legend: { display: false } } }

        }

        const ctxCat = document.getElementById(`chart-cat-${pId}`);

    function getFin(p) {
        const percComissao = Number(p?.percComissao || 0) / 100;
        const valorTotal = Number(p?.valorTotal || 0);
        const orcamento = Number(p?.orcamento || 0);

        const globalMetodo = String(p?.metodo || '');
        const globalIsCC = (globalMetodo === 'CC' || globalMetodo.toLowerCase().includes('cartão'));
        const baseProjetada = globalIsCC ? valorTotal * 0.97 : valorTotal;
        const commTotalProjetada = baseProjetada * percComissao;

        const recebimentos = Array.isArray(p?.recebimentos) ? p.recebimentos : [];
        let totalRecebido = 0; let commLiberada = 0;
        
        recebimentos.forEach(r => {
            const rVal = Number(r.valor || 0); totalRecebido += rVal;
            const rBase = (r.metodo === 'CC') ? rVal * 0.97 : rVal;
            commLiberada += rBase * percComissao;
        });

        const pays = Array.isArray(p?.pagamentosEfetuados) ? p.pagamentosEfetuados : [];
        const totalPaid = pays.reduce((a, c) => a + Number(c?.valor || 0), 0);
        const balance = commLiberada - totalPaid;
        
        let statusColor = "bg-red-500";
        if (balance < 0) statusColor = "bg-blue-500"; 
        else if (balance === 0 && commLiberada > 0) statusColor = "bg-emerald-500";
        else if (totalPaid > 0) statusColor = "bg-orange-500"; 

        const despesas = Array.isArray(p?.despesas) ? p.despesas : [];

                specificTableHTML = `<table class="w-full"><thead class="bg-slate-100 border-b border-slate-200 print:bg-transparent"><tr class="font-black uppercase text-[8px] sm:text-[9px] text-slate-500 text-left tracking-widest"><th class="p-3 sm:p-4">${window.t('prop_inv')}</th><th class="p-3 sm:p-4">${window.t('f_client')}</th><th class="p-3 sm:p-4">${window.t('f_seller')}</th><th class="p-3 sm:p-4 text-right">${window.t('f_gross')}</th></tr></thead><tbody>${sRows || `<tr><td colspan="4" class="p-6 text-center text-slate-400 text-xs italic">${window.t('no_active_works')}</td></tr>`}</tbody></table>`;
            } else if (state.reportActiveKpi === 'entradas') {
                kpiTitle = `Detalhamento: ${window.t('entries')}`;
                sRows = enrichedProjects.filter(({f}) => f.totalRecebido > 0).map(({p, f}) => `<tr class="border-b border-slate-100 text-[10px] sm:text-xs text-left text-slate-800 hover:bg-slate-50 transition-colors"><td class="p-3 sm:p-4 font-bold text-slate-500">${p.numeroProposta || '-'} / ${p.numeroInvoice || '-'}</td><td class="p-3 sm:p-4 font-black uppercase"><div class="flex flex-col"><span>${p.cliente || ''}</span><span class="text-[8px] sm:text-[9px] font-bold text-slate-400 mt-0.5">${tStatus(p.status)}</span></div></td><td class="p-3 sm:p-4 font-bold text-slate-600">${p.vendedor?.split('@')[0] || ''}</td><td class="p-3 sm:p-4 text-right text-slate-500">${formatCurr(p.valorTotal)}</td><td class="p-3 sm:p-4 text-right font-black text-emerald-600 text-sm">${formatCurr(f.totalRecebido)}</td></tr>`).join('');
                specificTableHTML = `<table class="w-full"><thead class="bg-slate-100 border-b border-slate-200 print:bg-transparent"><tr class="font-black uppercase text-[8px] sm:text-[9px] text-slate-500 text-left tracking-widest"><th class="p-3 sm:p-4">${window.t('prop_inv')}</th><th class="p-3 sm:p-4">${window.t('f_client')}</th><th class="p-3 sm:p-4">${window.t('f_seller')}</th><th class="p-3 sm:p-4 text-right">${window.t('f_gross')}</th><th class="p-3 sm:p-4 text-right">Total Recebido</th></tr></thead><tbody>${sRows || `<tr><td colspan="5" class="p-6 text-center text-slate-400 text-xs italic">Nenhum recebimento encontrado.</td></tr>`}</tbody></table>`;
            } else if (state.reportActiveKpi === 'fluxo') {
                kpiTitle = `Detalhamento: ${window.t('to_receive')}`;
                sRows = enrichedProjects.filter(({p, f}) => (p.valorTotal - f.totalRecebido) > 0).map(({p, f}) => `<tr class="border-b border-slate-100 text-[10px] sm:text-xs text-left text-slate-800 hover:bg-slate-50 transition-colors"><td class="p-3 sm:p-4 font-bold text-slate-500">${p.numeroProposta || '-'} / ${p.numeroInvoice || '-'}</td><td class="p-3 sm:p-4 font-black uppercase"><div class="flex flex-col"><span>${p.cliente || ''}</span><span class="text-[8px] sm:text-[9px] font-bold text-slate-400 mt-0.5">${tStatus(p.status)}</span></div></td><td class="p-3 sm:p-4 font-bold text-slate-600">${p.vendedor?.split('@')[0] || ''}</td><td class="p-3 sm:p-4 text-right text-slate-500">${formatCurr(p.valorTotal)}</td><td class="p-3 sm:p-4 text-right text-emerald-600">${formatCurr(f.totalRecebido)}</td><td class="p-3 sm:p-4 text-right font-black text-amber-500 text-sm">${formatCurr(p.valorTotal - f.totalRecebido)}</td></tr>`).join('');
                specificTableHTML = `<table class="w-full"><thead class="bg-slate-100 border-b border-slate-200 print:bg-transparent"><tr class="font-black uppercase text-[8px] sm:text-[9px] text-slate-500 text-left tracking-widest"><th class="p-3 sm:p-4">${window.t('prop_inv')}</th><th class="p-3 sm:p-4">${window.t('f_client')}</th><th class="p-3 sm:p-4">${window.t('f_seller')}</th><th class="p-3 sm:p-4 text-right">${window.t('f_gross')}</th><th class="p-3 sm:p-4 text-right">Recebido</th><th class="p-3 sm:p-4 text-right">${window.t('missing_receive')}</th></tr></thead><tbody>${sRows || `<tr><td colspan="6" class="p-6 text-center text-slate-400 text-xs italic">Nenhum saldo pendente.</td></tr>`}</tbody></table>`;
            } else if (state.reportActiveKpi === 'lucro') {
                kpiTitle = `Detalhamento: ${window.t('est_profit')} e ${window.t('margin')}`;
                sRows = enrichedProjects.map(({p, f}) => `<tr class="border-b border-slate-100 text-[10px] sm:text-xs text-left text-slate-800 hover:bg-slate-50 transition-colors"><td class="p-3 sm:p-4 font-bold text-slate-500">${p.numeroProposta || '-'} / ${p.numeroInvoice || '-'}</td><td class="p-3 sm:p-4 font-black uppercase"><div class="flex flex-col"><span>${p.cliente || ''}</span><span class="text-[8px] sm:text-[9px] font-bold text-slate-400 mt-0.5">${tStatus(p.status)}</span></div></td><td class="p-3 sm:p-4 text-right text-slate-500">${formatCurr(p.valorTotal)}</td><td class="p-3 sm:p-4 text-right text-red-500">${formatCurr(f.totalDespesas)}</td><td class="p-3 sm:p-4 text-right font-black ${f.lucroBruto >= 0 ? 'text-cyan-600' : 'text-red-600'} text-sm">${formatCurr(f.lucroBruto)}</td><td class="p-3 sm:p-4 text-right font-black ${f.margemLucro >= 0 ? 'text-indigo-500' : 'text-red-500'} text-sm">${f.margemLucro.toFixed(1)}%</td></tr>`).join('');
                specificTableHTML = `<table class="w-full"><thead class="bg-slate-100 border-b border-slate-200 print:bg-transparent"><tr class="font-black uppercase text-[8px] sm:text-[9px] text-slate-500 text-left tracking-widest"><th class="p-3 sm:p-4">${window.t('prop_inv')}</th><th class="p-3 sm:p-4">${window.t('f_client')}</th><th class="p-3 sm:p-4 text-right">${window.t('f_gross')}</th><th class="p-3 sm:p-4 text-right">${window.t('total_expenses')}</th><th class="p-3 sm:p-4 text-right">${window.t('real_profit')}</th><th class="p-3 sm:p-4 text-right">${window.t('margin')} %</th></tr></thead><tbody>${sRows || `<tr><td colspan="6" class="p-6 text-center text-slate-400 text-xs italic">${window.t('no_active_works')}</td></tr>`}</tbody></table>`;
            } else if (state.reportActiveKpi.startsWith('status_')) {
                const targetStatusMap = {
                    'status_aprovado': '✅ Aprovado',
                    'status_aguardando': 'Aguardando Início',
                    'status_execucao': 'Em Execução',
                    'status_finalizado': 'Finalizado'
                };
                const targetStatus = targetStatusMap[state.reportActiveKpi];
                kpiTitle = `Funil: ${tStatus(targetStatus).replace('✅ ', '')}`;
                sRows = enrichedProjects.filter(({p}) => p.status === targetStatus).map(({p, f}) => `<tr class="border-b border-slate-100 text-[10px] sm:text-xs text-left text-slate-800 hover:bg-slate-50 transition-colors"><td class="p-3 sm:p-4 font-bold text-slate-500">${p.numeroProposta || '-'} / ${p.numeroInvoice || '-'}</td><td class="p-3 sm:p-4 font-black uppercase"><div class="flex flex-col"><span>${p.cliente || ''}</span><span class="text-[8px] sm:text-[9px] font-bold text-slate-400 mt-0.5">${tStatus(p.status)}</span></div></td><td class="p-3 sm:p-4 font-bold text-slate-600">${p.vendedor?.split('@')[0] || ''}</td><td class="p-3 sm:p-4 text-right font-black text-slate-800 text-sm">${formatCurr(p.valorTotal)}</td></tr>`).join('');
                specificTableHTML = `<table class="w-full"><thead class="bg-slate-100 border-b border-slate-200 print:bg-transparent"><tr class="font-black uppercase text-[8px] sm:text-[9px] text-slate-500 text-left tracking-widest"><th class="p-3 sm:p-4">${window.t('prop_inv')}</th><th class="p-3 sm:p-4">${window.t('f_client')}</th><th class="p-3 sm:p-4">${window.t('f_seller')}</th><th class="p-3 sm:p-4 text-right">${window.t('f_gross')}</th></tr></thead><tbody>${sRows || `<tr><td colspan="4" class="p-6 text-center text-slate-400 text-xs italic">Nenhuma obra nesta etapa.</td></tr>`}</tbody></table>`;
            }

            bottomHTML = `
                <div class="mt-8 mb-10 animate-fade-in">
                    <div class="flex justify-between items-center mb-5 border-b-2 border-slate-100 pb-3">
                        <h3 class="text-base sm:text-lg font-black uppercase tracking-tighter text-indigo-600 flex items-center gap-2">
                            <i data-lucide="layout-list" class="w-5 h-5"></i> ${kpiTitle}
                        </h3>
                        <button onclick="window.printKpiReport()" class="hidden sm:inline-flex items-center gap-2 text-white force-white-text bg-slate-800 hover:bg-slate-700 transition-all font-black text-[10px] uppercase tracking-widest px-4 py-2 rounded-xl shadow-md no-print">
                            <i data-lucide="printer" class="w-3.5 h-3.5"></i> ${window.t('print_view')}
                        </button>
                    </div>
                    <div class="overflow-x-auto print:overflow-visible border border-slate-200 rounded-2xl print:border-none shadow-sm">
                        ${specificTableHTML}
                    </div>
                </div>
            `;
        }

        out.innerHTML = `
            <div class="glass p-6 sm:p-12 rounded-[50px] shadow-2xl border border-white/5 text-left print:bg-white print:border-none print:shadow-none print:p-0 animate-fade-in force-dark-bg">
                
                <div class="flex flex-col sm:flex-row justify-between items-start sm:items-center border-b-[8px] border-white/10 pb-8 mb-8 print:border-b-2 print:border-slate-300 gap-4">
                    <div class="logo-frame-sm p-3 rounded-2xl print:border-none print:p-0 bg-white shadow-lg"><img src="logo-D2-Group-preto.png" class="h-10 sm:h-14"></div>
                    <div class="text-left sm:text-right">
                        <h2 class="text-2xl sm:text-3xl font-black uppercase tracking-tighter text-white force-white-text print:text-slate-900">${reportTitle}</h2>
                        <p class="text-slate-400 font-black uppercase text-xs tracking-widest mt-1">${window.t('date')}: ${new Date().toLocaleDateString(state.lang === 'pt' ? 'pt-BR' : 'en-US')}</p>
                    </div>
                </div>
                
                <div class="bg-white p-6 sm:p-10 rounded-[40px] shadow-inner text-slate-900 print:p-0 print:shadow-none print:bg-transparent">
                    ${ceoDashHTML}

                    <div id="dynamic-report-content">
                        ${bottomHTML}
                    </div>
                    
                    ${state.reportActiveKpi === 'overview' ? `
                    <div class="mt-12 pt-8 border-t-4 border-slate-100 flex justify-center no-print">
                         <button onclick="window.printReport()" class="flex items-center gap-3 text-white force-white-text bg-slate-900 hover:bg-slate-800 transition-all font-black text-sm uppercase tracking-widest px-8 py-4 rounded-2xl shadow-xl hover:-translate-y-1">
                             <i data-lucide="printer" class="w-5 h-5"></i> ${window.t('print_full_rep')}
                         </button>
                    </div>` : ''}
                </div>
            </div>`;
        try { lucide.createIcons(); } catch {}
    };

    onAuthStateChanged(auth, (u) => {
        state.user = u;
        applyThemeConfig(); 
        if (u) {
            document.getElementById('auth-screen').classList.add('hidden'); document.getElementById('main-app').classList.remove('hidden');
            document.getElementById('user-display').innerText = u.email ? u.email.split('@')[0].toUpperCase() : "USR";
            initData(); logAccess(u.email, 'Fez login no sistema');
        } else {
            document.getElementById('auth-screen').classList.remove('hidden'); document.getElementById('main-app').classList.add('hidden'); document.body.className = 'auth-body';
        }
        window.setLang(state.lang); try { lucide.createIcons(); } catch {}
    });

    function initData() {
        if (!auth.currentUser) return;
        const projectsRef = collection(db, 'artifacts', appId, 'public', 'data', 'projects');
        onSnapshot(projectsRef, snap => {
            state.projects = snap.docs.map(d => ({ id: d.id, ...d.data() }));
            window.renderProjects(); window.renderReport();
        }, err => console.error(err));

        onSnapshot(collection(db, 'artifacts', appId, 'public', 'data', 'user_credentials'), snap => {
            if (!auth.currentUser) return; 
            const team = snap.docs.map(d => ({ id: d.id, ...d.data() })); state.team = team;
            
            if (auth.currentUser.email.toLowerCase() === SUPER_ADMIN.toLowerCase()) {
                state.currentUserRole = 'superadmin'; state.currentUserViewAll = true; state.currentUserViewCosts = true;
            } else {
                const myProfile = team.find(u => u.email.toLowerCase() === auth.currentUser.email.toLowerCase());
                if (!myProfile) { window.showModal(window.t('modal_access_denied'), window.t('error'), 'error'); signOut(auth); return; }
                state.currentUserRole = myProfile?.role || 'viewer';
                state.currentUserViewAll = myProfile?.viewAll || false;
                state.currentUserViewCosts = myProfile?.viewCosts || false;
            }
            window.applyPermissions(); renderVendedores();

            const container = document.getElementById('users-list');
            if (container && ['admin', 'superadmin'].includes(state.currentUserRole)) {
                container.innerHTML = team.map(u => {
                    let roleStr = "Editor", roleClass = "role-editor";
                    if(u.role === 'admin' || u.email.toLowerCase() === SUPER_ADMIN.toLowerCase()) { roleStr = "Admin"; roleClass = "role-admin"; }
                    if(u.role === 'viewer') { roleStr = "Viewer"; roleClass = "role-viewer"; }
                    const tagViewAll = u.viewAll ? `<span class="role-tag bg-cyan-500/20 text-cyan-400 ml-1">GLOBAL</span>` : '';
                    const tagCosts = u.viewCosts ? `<span class="role-tag bg-emerald-500/20 text-emerald-400 ml-1">COSTS</span>` : '';
                    return `<div class="glass p-6 rounded-[24px] flex justify-between items-center border-l-8 border-gold shadow-lg transition-all hover:scale-[1.01]"><div class="text-left"><p class="font-black text-slate-100 text-lg flex items-center gap-2 flex-wrap">${u.email} <span class="role-tag ${roleClass}">${roleStr}</span> ${tagViewAll} ${tagCosts}</p><p class="text-xs text-slate-500 mt-1 uppercase tracking-widest">Senha: <span class="text-gold font-bold normal-case">${u.password}</span></p></div><div class="flex gap-2"><button onclick="window.editTeamMember('${u.id}', '${u.email}', '${u.password}', '${u.role}', ${!!u.viewAll}, ${!!u.viewCosts})" class="p-2 text-gold hover:bg-gold/10 rounded-lg"><i data-lucide="edit" size="18"></i></button><button onclick="window.deleteTeam('${u.id}')" class="p-2 text-red-500 hover:bg-red-500/10 rounded-lg ${u.email.toLowerCase() === SUPER_ADMIN.toLowerCase() ? 'hidden' : ''}"><i data-lucide="user-minus" size="18"></i></button></div></div>`;
                }).join('');
                try { lucide.createIcons(); } catch {}
            }
        });
    }

    document.addEventListener('DOMContentLoaded', () => {
        try { lucide.createIcons(); } catch {}

        document.getElementById('login-form').onsubmit = async (e) => {
            e.preventDefault(); hideLoginMessages(); const btn = document.getElementById('btn-entrar'); btn.disabled = true;
            const email = document.getElementById('email').value.trim(); const pass = document.getElementById('password').value;
            try {
                await signInWithEmailAndPassword(auth, email, pass);
            } catch (err) {
                if (err?.code === 'auth/invalid-credential' || err?.code === 'auth/user-not-found') {
                    try { await createUserWithEmailAndPassword(auth, email, pass); return; } 
                    catch (createErr) { if (createErr.code === 'auth/email-already-in-use') showLoginError(window.t('error')); else showLoginError(window.t('error')); }
                } else if (err?.code === 'auth/unauthorized-domain') { showLoginError('Domínio não autorizado.'); } 
                else { showLoginError('Falha no login: ' + err.message); }
            } finally { btn.disabled = false; }
        };

        document.getElementById('project-form').onsubmit = async (e) => {
            e.preventDefault(); if (!auth.currentUser) return;
            const id = document.getElementById('edit-id').value;
            const d = {
                numeroProposta: document.getElementById('f-proposta').value || '', numeroInvoice: document.getElementById('f-invoice').value || '',
                empresa: document.getElementById('f-empresa').value, cliente: document.getElementById('f-cliente').value, vendedor: document.getElementById('f-vendedor').value,
                valorTotal: parseFloat(document.getElementById('f-valor').value),
                orcamento: parseFloat(document.getElementById('f-orcamento').value || 0), 
                metodo: document.getElementById('f-metodo').value, percComissao: parseInt(document.getElementById('f-comm').value),
                dataInicio: document.getElementById('f-inicio').value, dataEntrega: document.getElementById('f-entrega').value,
                status: document.getElementById('f-status').value, updatedAt: serverTimestamp()
            };

            try {
                if (id) { await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'projects', id), d); logAccess(state.user.email, `Editou a obra: ${d.cliente}`); } 
                else { await addDoc(collection(db, 'artifacts', appId, 'public', 'data', 'projects'), { ...d, archived: false, createdAt: serverTimestamp(), pagamentosEfetuados: [], recebimentos: [], despesas: [] }); logAccess(state.user.email, `Registrou nova obra: ${d.cliente}`); }
                e.target.reset(); document.getElementById('edit-id').value = ''; document.getElementById('f-vendedor').value = auth.currentUser.email; window.showView('projects');
            } catch (err) { console.error(err); }
        };

        document.getElementById('team-form').onsubmit = async (e) => {
            e.preventDefault(); if (!auth.currentUser) return;
            const id = document.getElementById('t-id').value; const mail = document.getElementById('t-email').value.trim();
            const pass = document.getElementById('t-pass').value; const role = document.getElementById('t-role').value;
            const viewAll = document.getElementById('t-viewall').checked; 
            const viewCosts = document.getElementById('t-viewcosts').checked; 

            try {
                try { const secApp = initializeApp(firebaseConfig, "SecApp_" + Date.now()); const secAuth = getAuth(secApp); await createUserWithEmailAndPassword(secAuth, mail, pass); await signOut(secAuth); await deleteApp(secApp); } catch (authErr) {}
                if (!id) { await addDoc(collection(db, 'artifacts', appId, 'public', 'data', 'user_credentials'), { email: mail, password: pass, role: role, viewAll: viewAll, viewCosts: viewCosts, updatedAt: serverTimestamp() }); logAccess(state.user.email, `Adicionou usuário: ${mail}`); } 
                else { await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'user_credentials', id), { email: mail, password: pass, role: role, viewAll: viewAll, viewCosts: viewCosts, updatedAt: serverTimestamp() }); logAccess(state.user.email, `Atualizou usuário: ${mail}`); }
                e.target.reset(); document.getElementById('t-id').value = ''; document.getElementById('t-viewall').checked = false; document.getElementById('t-viewcosts').checked = false;
            } catch (err) { window.showModal(window.t('error'), 'Erro ao salvar usuário: ' + err.message, 'error'); }
        };
    });
</script>
</body>
</html>
